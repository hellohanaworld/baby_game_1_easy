// ── Audio
let AC=null;
const GVOL=0.45;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function tone(freq,dur,type,vol,freqEnd){
  try{
    const a=getAC();
    if(a.state==='suspended')a.resume();
    const o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type=type||'square';
    o.frequency.setValueAtTime(freq,a.currentTime);
    if(freqEnd)o.frequency.linearRampToValueAtTime(freqEnd,a.currentTime+dur);
    g.gain.setValueAtTime((vol||0.12)*GVOL,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
    o.start();o.stop(a.currentTime+dur+0.02);
  }catch(e){}
}
function sfxJump(){tone(280,0.04,'square',0.14);setTimeout(()=>tone(480,0.04,'square',0.13),40);setTimeout(()=>tone(780,0.12,'square',0.15),85);}
function sfxDie(){tone(420,0.07,'sawtooth',0.20);setTimeout(()=>tone(320,0.09,'sawtooth',0.18),70);setTimeout(()=>tone(220,0.12,'sawtooth',0.15),155);setTimeout(()=>tone(140,0.22,'sawtooth',0.11),265);}
function sfxStomp(){tone(180,0.06,'square',0.18);setTimeout(()=>tone(110,0.12,'square',0.14),60);}
function sfxCoin(){tone(880,0.04,'sine',0.11);setTimeout(()=>tone(1320,0.14,'sine',0.09),45);}

function speakWord(word){
  if(!word||!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const say=(text,r,p)=>{const u=new SpeechSynthesisUtterance(text);u.lang='ko-KR';u.rate=r;u.pitch=p;u.volume=1;window.speechSynthesis.speak(u);};
  say(word,0.85,1.0);
  [...word].forEach(ch=>say(ch,0.70,1.0));
  say(word,0.75,1.0);
}

// iOS Safari requires audio/TTS to be unlocked inside a user gesture.
// resume() alone is not enough — must actually produce sound in the gesture.
let audioUnlocked=false;
function unlockAudio(){
  if(audioUnlocked)return;
  try{
    const a=getAC();
    if(a.state==='suspended')a.resume();
    const buf=a.createBuffer(1,1,22050);
    const src=a.createBufferSource();
    src.buffer=buf;src.connect(a.destination);src.start(0);
    audioUnlocked=true;
  }catch(e){}
  if(window.speechSynthesis){
    try{
      const u=new SpeechSynthesisUtterance(' ');u.volume=0;u.rate=2;u.lang='ko-KR';
      window.speechSynthesis.speak(u);
    }catch(e){}
  }
}
addEventListener('touchstart',unlockAudio,{passive:true});
addEventListener('touchend',unlockAudio,{passive:true});
addEventListener('mousedown',unlockAudio);
addEventListener('keydown',unlockAudio);

// ── Sprite sheets (2×2 grid each)
// [0,0] idle  [1,0] jump  [0,1] run  [1,1] dead
const SPF={walk1:[0,1],jump:[1,0],idle:[0,0],dead:[1,1]};

function removeWhiteBG(img){
  const oc=document.createElement('canvas');
  oc.width=img.naturalWidth;oc.height=img.naturalHeight;
  const otx=oc.getContext('2d');
  otx.drawImage(img,0,0);
  const id=otx.getImageData(0,0,oc.width,oc.height),d=id.data;
  const W=oc.width,H=oc.height;
  // 배경 판별: 이미 투명이거나, 무채색(회색/흰색) 계열 밝은 픽셀
  const isBg=(pi)=>{
    if(d[pi+3]<10)return true;
    const r=d[pi],g=d[pi+1],b=d[pi+2];
    const dev=Math.max(Math.abs(r-g),Math.abs(g-b),Math.abs(r-b));
    return dev<30&&(r+g+b)/3>110;
  };
  const vis=new Uint8Array(W*H);
  const q=[];
  const push=(x,y)=>{
    if(x<0||x>=W||y<0||y>=H)return;
    const idx=y*W+x;if(vis[idx])return;vis[idx]=1;
    if(isBg(idx*4)){d[idx*4+3]=0;q.push(x,y);}
  };
  for(let x=0;x<W;x++){push(x,0);push(x,H-1);}
  for(let y=1;y<H-1;y++){push(0,y);push(W-1,y);}
  for(let i=0;i<q.length;i+=2){
    const x=q[i],y=q[i+1];
    push(x+1,y);push(x-1,y);push(x,y+1);push(x,y-1);
  }
  // 2단계: 3회 반복 누적 곱셈으로 검정 머리 주변 회색 잔상까지 제거
  for(let pass=0;pass<3;pass++){
    for(let y=0;y<H;y++){
      for(let x=0;x<W;x++){
        const pi=(y*W+x)*4;
        if(d[pi+3]<10)continue;
        const nearTrans=
          (x>0&&d[(y*W+x-1)*4+3]<210)||(x<W-1&&d[(y*W+x+1)*4+3]<210)||
          (y>0&&d[((y-1)*W+x)*4+3]<210)||(y<H-1&&d[((y+1)*W+x)*4+3]<210);
        if(!nearTrans)continue;
        const r=d[pi],g=d[pi+1],b=d[pi+2];
        const bright=(r+g+b)/3;
        const dev=Math.max(Math.abs(r-g),Math.abs(g-b),Math.abs(r-b));
        if(dev<40&&bright>25){
          // 무채색 잔상: 흰 배경 블렌딩 역산을 매 pass마다 곱셈 적용
          d[pi+3]=Math.floor(Math.max(0,1-bright/255)*d[pi+3]);
        } else if(bright>185){
          d[pi+3]=Math.max(0,Math.floor(d[pi+3]*(1-(bright-185)/70)));
        }
      }
    }
  }
  otx.putImageData(id,0,0);
  return oc;
}

// ── Offscreen caches (perf)
const wordCardImg={};
function getCardImg(word,borderColor){
  const key=word+'|'+borderColor;
  if(wordCardImg[key])return wordCardImg[key];
  const cw=word.length*14+14,ch=22,pad=6;
  const oc=document.createElement('canvas');
  oc.width=cw+pad*2;oc.height=ch+pad*2;
  const o=oc.getContext('2d');
  o.fillStyle='rgba(0,0,0,0.3)';o.beginPath();o.roundRect(pad+1.5,pad+2.5,cw,ch,5);o.fill();
  o.fillStyle='#fffde7';o.beginPath();o.roundRect(pad,pad,cw,ch,5);o.fill();
  o.strokeStyle=borderColor;o.lineWidth=1.8;o.beginPath();o.roundRect(pad,pad,cw,ch,5);o.stroke();
  o.font='bold 14px "맑은 고딕",sans-serif';o.textAlign='center';o.textBaseline='middle';
  o.fillStyle='#1a237e';o.fillText(word,pad+cw/2,pad+ch/2+1);
  wordCardImg[key]=oc;return oc;
}
const flipSpriteCache={};
function getFlippedSprite(name){
  if(flipSpriteCache[name])return flipSpriteCache[name];
  const src=SPRITES[name];if(!src||!src.complete||!src.width)return null;
  const oc=document.createElement('canvas');
  oc.width=src.width;oc.height=src.height;
  const o=oc.getContext('2d');
  o.translate(src.width,0);o.scale(-1,1);o.drawImage(src,0,0);
  flipSpriteCache[name]=oc;return oc;
}

// Pixel-measured offsets per character per pose
// x: horizontal offset scalar (multiplied by facing), y: vertical offset
const CHARS=[
  {name:'지율이',src:()=>sprSrc,isReady:()=>sprReady,
   off:{idle:{y:12,x:0},jump:{y:10,x:14},run:{y:23,x:4},dead:{y:10,x:12}}},
  {name:'해인이',src:()=>sprSrc2,isReady:()=>sprReady2,
   off:{idle:{y:4,x:0},jump:{y:11,x:10},run:{y:18,x:4},dead:{y:20,x:14}}},
];
let selectedChar=0;

function drawSprite(ox,oy,facing,walkOsc,inAir,isDead){
  const ch=CHARS[selectedChar];
  if(!ch.isReady()){drawCat(ox,oy,facing,walkOsc,inAir);return;}
  const src=ch.src();
  const sw=src.width/2,sh=src.height/2;
  let f,off;
  if(isDead){f=SPF.dead;off=ch.off.dead;}
  else if(inAir){f=SPF.jump;off=ch.off.jump;}
  else if(walkOsc!==0){f=SPF.walk1;off=ch.off.run;}
  else{f=SPF.idle;off=ch.off.idle;}
  const[sc,sr]=f;
  const dh=PH*1.6,dw=dh;
  const dx=ox+PW/2-dw/2+off.x*facing,dy=oy+PH-dh+off.y;
  cx.save();
  if(facing<0){cx.translate(dx+dw/2,0);cx.scale(-1,1);cx.translate(-(dx+dw/2),0);}
  cx.drawImage(src,sc*sw,sr*sh,sw,sh,dx,dy,dw,dh);
  cx.restore();
}

// Draw sprite for a specific character index (for UI previews)
function drawSpriteChar(charIdx,ox,oy,facing,walkOsc,inAir){
  const ch=CHARS[charIdx];
  if(!ch.isReady()){return;}
  const src=ch.src();
  const sw=src.width/2,sh=src.height/2;
  const showDead=arguments[6];
  const off=showDead?ch.off.dead:inAir?ch.off.jump:walkOsc!==0?ch.off.run:ch.off.idle;
  const f=showDead?SPF.dead:inAir?SPF.jump:walkOsc!==0?SPF.walk1:SPF.idle;
  const[sc,sr]=f;
  const dh=PH*1.6,dw=dh;
  const dx=ox+PW/2-dw/2+off.x*facing,dy=oy+PH-dh+off.y;
  cx.save();
  if(facing<0){cx.translate(dx+dw/2,0);cx.scale(-1,1);cx.translate(-(dx+dw/2),0);}
  cx.drawImage(src,sc*sw,sr*sh,sw,sh,dx,dy,dw,dh);
  cx.restore();
}

// ── Keyboard input
const K={},JP={};
addEventListener('keydown',e=>{
  if(!K[e.code])JP[e.code]=true;
  K[e.code]=true;
  if(['Space','ArrowUp','ArrowLeft','ArrowRight','ArrowDown'].includes(e.code))e.preventDefault();
  getAC();
});
addEventListener('keyup',e=>{K[e.code]=false;});
function jp(code){const v=!!JP[code];delete JP[code];return v;}

// ── Mobile touch controls
const TOUCH={left:false,right:false,jump:false};
let _jpJump=false,_anyTap=false,_tapX=-1,_tapY=-1;
const BTN={
  left: {x:18,  y:402, w:92,  h:78},
  right:{x:122, y:402, w:92,  h:78},
  jump: {x:W-148,y:396,w:124, h:86}
};
function getTouchBtn(tx,ty){
  const rect=cv.getBoundingClientRect();
  const cx2=(tx-rect.left)*(W/rect.width);
  const cy2=(ty-rect.top)*(H/rect.height);
  if(cy2>BTN.left.y&&cy2<BTN.left.y+BTN.left.h&&cx2>BTN.left.x&&cx2<BTN.left.x+BTN.left.w)return'left';
  if(cy2>BTN.right.y&&cy2<BTN.right.y+BTN.right.h&&cx2>BTN.right.x&&cx2<BTN.right.x+BTN.right.w)return'right';
  if(cy2>BTN.jump.y&&cy2<BTN.jump.y+BTN.jump.h&&cx2>BTN.jump.x&&cx2<BTN.jump.x+BTN.jump.w)return'jump';
  return null;
}
function updateTouchState(touches,active){
  const prevJump=TOUCH.jump;
  TOUCH.left=TOUCH.right=TOUCH.jump=false;
  if(active){
    for(let i=0;i<touches.length;i++){const b=getTouchBtn(touches[i].clientX,touches[i].clientY);if(b)TOUCH[b]=true;}
  }
  if(TOUCH.jump&&!prevJump)_jpJump=true;
}
cv.addEventListener('touchstart',e=>{
  e.preventDefault();getAC();_anyTap=true;
  if(e.touches.length>0){const r=cv.getBoundingClientRect();_tapX=(e.touches[0].clientX-r.left)*(W/r.width);_tapY=(e.touches[0].clientY-r.top)*(H/r.height);}
  updateTouchState(e.touches,true);
},{passive:false});
cv.addEventListener('mousedown',e=>{
  getAC();_anyTap=true;
  const r=cv.getBoundingClientRect();_tapX=(e.clientX-r.left)*(W/r.width);_tapY=(e.clientY-r.top)*(H/r.height);
});
cv.addEventListener('touchmove', e=>{e.preventDefault();updateTouchState(e.touches,true);},{passive:false});
cv.addEventListener('touchend',  e=>{e.preventDefault();updateTouchState(e.touches,e.touches.length>0);},{passive:false});
cv.addEventListener('touchcancel',e=>{e.preventDefault();TOUCH.left=TOUCH.right=TOUCH.jump=false;},{passive:false});
function jpTouch(){const v=_jpJump;_jpJump=false;return v;}
function jpTap(){const v=_anyTap;_anyTap=false;return v;}

// ── Physics
function overlaps(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}
function getSolids(){
  const s=sd.plats.map(([x,y,w])=>({x,y,w,h:PLAT_H}));
  s.push({x:-9999,y:GY,w:99999,h:200});
  if(stageNum===6&&mech.bubbles){
    for(const b of mech.bubbles)s.push({x:b.x,y:b.y,w:b.w,h:b.h});
  }
  if(stageNum===15&&mech.movPlats){
    for(const p of mech.movPlats)s.push({x:p.x,y:p.y,w:p.w,h:PLAT_H});
  }
  return s;
}
function moveEntity(e,solids){
  e.onGround=false;
  e.x+=e.vx;
  if(e.x<0){e.x=0;e.vx=0;}
  if(e.x+e.w>sd.w){e.x=sd.w-e.w;e.vx=0;}
  for(const s of solids){
    if(!overlaps(e.x,e.y,e.w,e.h,s.x,s.y,s.w,s.h))continue;
    const ox=Math.min(e.x+e.w,s.x+s.w)-Math.max(e.x,s.x);
    if(e.x+e.w/2<s.x+s.w/2)e.x-=ox;else e.x+=ox;
    e.vx=0;
  }
  e.y+=e.vy;
  for(const s of solids){
    if(!overlaps(e.x,e.y,e.w,e.h,s.x,s.y,s.w,s.h))continue;
    const oy=Math.min(e.y+e.h,s.y+s.h)-Math.max(e.y,s.y);
    if(e.y+e.h/2<s.y+s.h/2){e.y-=oy;e.vy=0;e.onGround=true;}
    else{e.y+=oy;if(e.vy<0)e.vy=0;}
  }
}

  cardFlights=[];playerCard=null;popParticles=[];
  // Warm up offscreen caches so first-encounter draw doesn't hitch
  for(const e of enemies){getCardImg(e.word,'#ef5350');getCardImg(e.word,'#ffd600');getFlippedSprite(e.sprite);}
  initMechanic(n);
  numRain=[];
  initGhosts(n);
}

function killPlayer(word){
  if(player.dead)return;
  player.dead=true;player.deadTimer=40;player.vy=-11;player.deadRot=0;
  deathWord=word||'';
  sfxDie();lives--;
}

// ── Mechanic update
function updateMechanic(solids){
  const n=stageNum;

  if(n===3&&mech.stars){
    if(mech.starTimer>0)mech.starTimer--;
    for(const s of mech.stars){
      if(s.collected)continue;
      if(overlaps(player.x,player.y,PW,PH,s.x-15,s.y-15,30,30)){
        s.collected=true;mech.starTimer=8*60;sfxStar();
      }
    }
    if(mech.starTimer>0&&!player.dead){
      for(const e of enemies){
        if(e.dead)continue;
        if(overlaps(player.x,player.y,PW,PH,e.x,e.y,e.w,e.h)){
          e.dead=true;e.deadTimer=35;score+=300;sfxStomp();
        }
      }
    }
  }

  if(n===4&&mech.lemmings){
    const LH=24;
    for(const l of mech.lemmings){
      if(!l.alive){if(--l.respawn<=0){l.alive=true;l.x=Math.max(5,player.x-70+Math.random()*20);l.y=player.y;}continue;}
      const tx=player.x-l.lag;
      const dx=tx-l.x;
      l.vx=(l.vx+Math.sign(dx)*0.5)*0.8;
      if(Math.abs(l.vx)>2.5)l.vx=Math.sign(l.vx)*2.5;
      l.vy+=GRAV*0.9;if(l.vy>15)l.vy=15;
      l.x+=l.vx;l.y+=l.vy;
      for(const s of solids){
        if(overlaps(l.x,l.y,16,LH,s.x,s.y,s.w,s.h)){
          const ov=Math.min(l.y+LH,s.y+s.h)-Math.max(l.y,s.y);
          if(l.y+LH/2<s.y+s.h/2){l.y-=ov;l.vy=0;}
          else{l.y+=ov;l.vy=0;}
        }
      }
      if(l.y>H+50){l.alive=false;l.respawn=180;}
      if(l.x<0)l.x=0;
    }
  }

  if(n===5&&mech.lavaY!==undefined){
    mech.lavaY-=mech.lavaSpeed;
    mech.lavaSpeed=Math.min(mech.lavaSpeed+0.00008,0.20);
    if(!player.dead&&player.y+PH>mech.lavaY)killPlayer();
  }

  if(n===6&&mech.bubbles){
    for(const b of mech.bubbles){
      b.y+=b.vy;
      if(b.y+b.h<GY-230)b.y=GY-50+Math.random()*30;
    }
  }

  if(n===7&&mech.boss){
    const boss=mech.boss;
    if(boss.flash>0)boss.flash--;
    if(!boss.dead){
      boss.x+=boss.vx;
      if(boss.x<=boss.patL||boss.x+boss.w>=boss.patR)boss.vx*=-1;
      boss.y=GY-boss.h;
      if(overlaps(player.x,player.y,PW,PH,boss.x,boss.y,boss.w,boss.h)){
        const prevBottom=player.y+PH-player.vy;
        if(prevBottom<=boss.y+boss.h*0.5&&player.y+PH<boss.y+boss.h*0.65){
          boss.hp--;boss.flash=14;player.vy=JVY*0.52;score+=150;sfxStomp();sfxBoss();
          if(boss.hp<=0){boss.dead=true;boss.deadTimer=150;score+=3000;sfxClear();}
        } else killPlayer(WORDS[17]);
      }
    } else {
      if(boss.deadTimer>0){boss.deadTimer--;}
      else if(mech.flagY>0){
        mech.rumbleT++;
        if(mech.rumbleT%40===1)sfxRumble();
        mech.shake=5;
        mech.flagY=Math.max(0,mech.flagY-2.5);
        if(mech.flagY===0)sfxKey();
      }
      if(mech.shake>0)mech.shake--;
    }
  }

  if(n===8&&mech.boostPads){
    if(mech.boostTimer>0)mech.boostTimer--;
    if(mech.boostTimer===0){
      for(const p of mech.boostPads){
        if(player.onGround&&overlaps(player.x,player.y+PH-4,PW,6,p.x,p.y,p.w,p.h+4)){
          mech.boostDir=player.facing!==0?player.facing:1;
          mech.boostTimer=75;sfxBoost();break;
        }
      }
    }
    if(mech.boostTimer>0)player.vx=mech.boostDir*SPD*2.6;
  }

  if(n===9&&mech.icePuffs){
    if(player.onGround&&Math.abs(player.vx)>2.5&&Math.random()<0.25){
      mech.icePuffs.push({x:player.x+PW/2-cam.x,y:GY,vx:(Math.random()-0.5)*2,vy:-Math.random()*2,life:22});
    }
    for(let i=mech.icePuffs.length-1;i>=0;i--){
      const p=mech.icePuffs[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;
      if(p.life<=0)mech.icePuffs.splice(i,1);
    }
  }

  if(n===10&&mech.key){
    if(mech.doorFlash>0)mech.doorFlash--;
    if(!mech.key.collected&&overlaps(player.x,player.y,PW,PH,mech.key.x-16,mech.key.y-16,32,32)){
      mech.key.collected=true;mech.doorOpen=true;mech.doorFlash=80;sfxKey();
    }
    if(!mech.doorOpen&&!player.dead&&player.x+PW>sd.flag-42){
      player.x=sd.flag-42-PW;player.vx=0;mech.doorFlash=Math.max(mech.doorFlash,10);
    }
  }

  // ── Stage 11: UFO lasers
  if(n===11&&mech.ufos){
    for(const u of mech.ufos){
      u.x+=u.vx;
      if(u.x<=u.patL||u.x>=u.patR)u.vx*=-1;
      const usx=u.x-cam.x;
      if(usx>-160&&usx<W+160){
        if(--u.laserT<=0){
          u.laserT=u.laserCd;
          u.laser={x:u.x,y:78,vy:2.8,active:true};
        }
      }
      if(u.laser&&u.laser.active){
        u.laser.y+=u.laser.vy;
        if(u.laser.y>GY+20)u.laser.active=false;
        if(!player.dead&&overlaps(player.x,player.y,PW,PH,u.laser.x-5,u.laser.y-14,10,18)){
          u.laser.active=false;killPlayer(WORDS[0]);
        }
      }
    }
  }

  // ── Stage 12: Stomp legs + missile plants
  if(n===12&&mech.stompLegs){
    const LW=58,LH=115;
    for(const l of mech.stompLegs){
      const inView=Math.abs(l.x-cam.x-W/2)<W;
      if(l.phase==='idle'){if(inView&&--l.timer<=0){l.phase='warning';l.timer=85;l.y=-LH;l.shadow=0;}}
      else if(l.phase==='warning'){
        l.shadow=Math.min(0.62,l.shadow+0.014);l.y=Math.min(-28,l.y+1.0);
        if(--l.timer<=0)l.phase='stomping';
      }
      else if(l.phase==='stomping'){
        l.y+=9;
        if(l.y+LH>=GY){l.y=GY-LH;l.phase='hold';l.timer=28;}
        if(!player.dead&&overlaps(player.x,player.y,PW,PH,l.x-LW/2,Math.max(0,l.y),LW,LH))killPlayer(WORDS[3]);
      }
      else if(l.phase==='hold'){
        if(!player.dead&&overlaps(player.x,player.y,PW,PH,l.x-LW/2,l.y,LW,LH))killPlayer(WORDS[3]);
        if(--l.timer<=0)l.phase='retracting';
      }
      else if(l.phase==='retracting'){
        l.y-=5;l.shadow=Math.max(0,l.shadow-0.022);
        if(l.y+LH<0){l.phase='idle';l.timer=155+Math.floor(Math.random()*90);l.y=-200;}
      }
    }
    for(const p of mech.mPlants){
      const inView=Math.abs(p.x-cam.x-W/2)<W;
      if(inView&&--p.t<=0){
        p.t=p.cd;
        const dx=(player.x+PW/2)-p.x,dy=(player.y+PH/2)-(GY-28);
        const d=Math.sqrt(dx*dx+dy*dy)||1,sp=2.0;
        p.projs.push({x:p.x,y:GY-28,vx:dx/d*sp,vy:dy/d*sp,life:210,active:true});
      }
      for(let i=p.projs.length-1;i>=0;i--){
        const pr=p.projs[i];
        if(!pr.active){p.projs.splice(i,1);continue;}
        pr.x+=pr.vx;pr.y+=pr.vy;pr.life--;
        if(pr.life<=0||pr.y>GY+22||pr.y<-22)pr.active=false;
        if(!player.dead&&overlaps(player.x,player.y,PW,PH,pr.x-9,pr.y-9,18,18)){pr.active=false;killPlayer(WORDS[4]);}
      }
    }
  }

  // ── Stage 14: Water geysers
  if(n===14&&mech.geysers){
    const GW=28;
    for(const g of mech.geysers){
      if(g.phase==='idle'){
        if(--g.timer<=0){g.phase='warning';g.timer=65;}
      } else if(g.phase==='warning'){
        if(--g.timer<=0){g.phase='active';g.timer=55;g.h=0;}
      } else if(g.phase==='active'){
        g.h=Math.min(g.h+9,115);
        if(--g.timer<=0){g.phase='retreat';g.timer=32;}
        if(!player.dead&&overlaps(player.x,player.y,PW,PH,g.x-GW/2,GY-g.h,GW,g.h))killPlayer(WORDS[1]);
      } else if(g.phase==='retreat'){
        g.h=Math.max(g.h-7,0);
        if(--g.timer<=0){g.phase='idle';g.timer=g.cd;g.h=0;}
      }
    }
  }

  // ── Stage 15: Moving platforms
  if(n===15&&mech.movPlats){
    for(const p of mech.movPlats){
      p.y=p.baseY+Math.sin(gt*p.freq+p.ph)*p.amp;
    }
  }

  // ── Stage 13: Magic orbs + bolt cannons
  if(n===13&&mech.magicOrbs){
    for(const o of mech.magicOrbs){
      o.wx+=o.vx;
      if(o.wx<80||o.wx>sd.w-80)o.vx*=-1;
      o.y=o.baseY+Math.sin(gt*o.freq+o.ph)*o.amp;
      const r=20;
      if(!player.dead&&overlaps(player.x,player.y,PW,PH,o.wx-r,o.y-r,r*2,r*2))killPlayer(WORDS[2]);
    }
    for(const c of mech.mCannons){
      const inView=Math.abs(c.x-cam.x-W/2)<W;
      if(inView&&--c.t<=0){
        c.t=c.cd;
        const dx=(player.x+PW/2)-c.x,dy=(player.y+PH/2)-c.y;
        const d=Math.sqrt(dx*dx+dy*dy)||1,sp=2.2;
        mech.mBolts.push({x:c.x,y:c.y,vx:dx/d*sp,vy:dy/d*sp,life:165,active:true});
      }
    }
    for(let i=mech.mBolts.length-1;i>=0;i--){
      const b=mech.mBolts[i];
      if(!b.active){mech.mBolts.splice(i,1);continue;}
      b.x+=b.vx;b.y+=b.vy;b.life--;
      if(b.life<=0||b.y>GY+22)b.active=false;
      if(!player.dead&&overlaps(player.x,player.y,PW,PH,b.x-8,b.y-8,16,16)){b.active=false;killPlayer(WORDS[5]);}
    }
  }
}

// ── Update
function updatePlaying(){
  spawnNumRain();
  // Bubble platform update must happen before getSolids
  if(stageNum===6&&mech.bubbles){
    for(const b of mech.bubbles){b.y+=b.vy;if(b.y+b.h<GY-230)b.y=GY-50+Math.random()*30;}
    if(mech.bubbles)for(const b of mech.bubbles)b.y-=b.vy; // undo (updateMechanic does it again)
  }
  const solids=getSolids();
  if(!player.dead){
    const goLeft=K.ArrowLeft||TOUCH.left;
    const goRight=K.ArrowRight||TOUCH.right;
    const doJump=(jp('Space')||jp('ArrowUp')||jpTouch());
    const ice=stageNum===9;
    if(ice){
      if(goLeft){player.vx=Math.max(player.vx-0.55,-SPD*1.1);player.facing=-1;}
      else if(goRight){player.vx=Math.min(player.vx+0.55,SPD*1.1);player.facing=1;}
      else player.vx*=(player.onGround?0.97:0.90);
    } else {
      if(goLeft){player.vx=-SPD;player.facing=-1;}
      else if(goRight){player.vx=SPD;player.facing=1;}
      else player.vx*=0.72;
    }
    const curGrav=stageNum===6?GRAV*0.4:GRAV;
    const curMaxFall=stageNum===6?9:20;
    if(doJump&&player.onGround){player.vy=JVY;player.onGround=false;sfxJump();}
    player.vy+=curGrav;if(player.vy>curMaxFall)player.vy=curMaxFall;
    moveEntity(player,solids);
    if(player.x<0)player.x=0;
    if(player.y>H+120)killPlayer();
    const camTarget=Math.max(0,Math.min(player.x-W*0.35,sd.w-W));
    cam.x+=(camTarget-cam.x)*0.22;
  } else {
    player.deadTimer--;
    player.vy+=GRAV;player.y+=player.vy;player.x+=player.vx*0.95;player.deadRot+=0.18;
    if(player.deadTimer<=0){
      state='wordcard';timer=0;
    }
    return;
  }
  for(const e of enemies){
    if(e.dead){e.deadTimer--;continue;}
    e.x+=e.vx;
    if(e.x<=e.patL||e.x+e.w>=e.patR)e.vx*=-1;
    e.y=e.groundY;
  }
  for(const c of coins){
    if(c.collected)continue;
    if(overlaps(player.x,player.y,player.w,player.h,c.x,c.y,c.w,c.h)){c.collected=true;score+=100;sfxCoin();}
  }
  // Enemy collision (skip in star mode for stage 3)
  const starMode=stageNum===3&&mech.starTimer>0;
  if(!starMode){
    for(const e of enemies){
      if(e.dead)continue;
      if(!overlaps(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h))continue;
      const prevBottom=player.y+player.h-player.vy;
      if(player.vy>1&&prevBottom<=e.y+12){e.dead=true;e.deadTimer=35;player.vy=JVY*0.78;score+=200;sfxStomp();spawnCardFlight(e);spawnPopFX(e);}
      else if(stageNum===8&&mech.boostTimer>0){e.dead=true;e.deadTimer=35;score+=300;sfxStomp();spawnCardFlight(e);spawnPopFX(e);}
      else killPlayer(e.word);
    }
  }
  updateGhosts();
  updateMechanic(solids);
  updateCardFlights();
  updatePopParticles();
  if(player.x+player.w>sd.flag&&player.x<sd.flag+22){
    if((stageNum!==10||mech.doorOpen)&&(stageNum!==7||mech.flagY===0)){
      sfxClear();if(score>hiScore)hiScore=score;state='stageclear';timer=160;
    }
  }
  clouds.forEach(c=>{c.x-=0.25;if(c.x+c.r*2<0)c.x=W+c.r;});
  if(mech.hintTimer!==undefined&&mech.hintTimer>0)mech.hintTimer--;
}

// ── Draw helpers
function fillR(x,y,w,h,clr){cx.fillStyle=clr;cx.fillRect(x,y,w,h);}
function fillRR(x,y,w,h,r,clr){cx.fillStyle=clr;cx.beginPath();cx.roundRect(x,y,w,h,r);cx.fill();}
function fillC(x,y,r,clr){cx.fillStyle=clr;cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();}
function txt(s,x,y,sz,clr,align='center'){cx.fillStyle=clr;cx.font=`bold ${sz}px "맑은 고딕",sans-serif`;cx.textAlign=align;cx.textBaseline='middle';cx.fillText(s,x,y);}
function txtS(s,x,y,sz,clr,stk,align='center'){cx.font=`bold ${sz}px "맑은 고딕",sans-serif`;cx.textAlign=align;cx.textBaseline='middle';cx.strokeStyle=stk;cx.lineWidth=5;cx.lineJoin='round';cx.strokeText(s,x,y);cx.fillStyle=clr;cx.fillText(s,x,y);}

function drawCloudShape(x,y,r,clr){
  cx.fillStyle=clr;cx.beginPath();
  cx.arc(x,y,r,0,Math.PI*2);cx.arc(x+r*0.72,y+r*0.1,r*0.68,0,Math.PI*2);
  cx.arc(x-r*0.62,y+r*0.12,r*0.65,0,Math.PI*2);cx.arc(x+r*0.3,y-r*0.38,r*0.58,0,Math.PI*2);
  cx.arc(x-r*0.25,y-r*0.28,r*0.52,0,Math.PI*2);cx.fill();
}

// ── Parallax silhouettes
function drawSilhouette(){
  const t=th;
  const p1=((cam.x*0.15)%W+W)%W;
  const p2=((cam.x*0.38)%W+W)%W;

  if(t.decor==='mushroom'){
    if(SPRITES.hill){
      const sp=SPRITES.tree,sp2=SPRITES.hill,sp3=SPRITES.mushroom_big,sp4=SPRITES.mushroom_small;
      if(sp){
        const h=140,w=h*sp.width/sp.height,sw=W+320,pp=((cam.x*0.18)%sw+sw)%sw;
        cx.globalAlpha=0.5;
        for(let i=0;i<3;i++){const tx=((i*320-pp)%sw+sw)%sw-160;cx.drawImage(sp,tx-w/2,GY-h+6,w,h);}
        cx.globalAlpha=1;
      }
      const h2=85,w2=h2*sp2.width/sp2.height,sw2=W+260,pp2=((cam.x*0.28)%sw2+sw2)%sw2;
      cx.globalAlpha=0.85;
      for(let i=0;i<4;i++){const tx=((i*260-pp2)%sw2+sw2)%sw2-130;cx.drawImage(sp2,tx-w2/2,GY-h2+8,w2,h2);}
      cx.globalAlpha=1;
      if(sp3){
        const h3=72,w3=h3*sp3.width/sp3.height,sw3=W+280,pp3=((cam.x*0.42)%sw3+sw3)%sw3;
        for(let i=0;i<3;i++){const tx=((i*280-pp3)%sw3+sw3)%sw3-140;cx.drawImage(sp3,tx-w3/2,GY-h3+4,w3,h3);}
      }
      if(sp4){
        const h4=42,w4=h4*sp4.width/sp4.height,sw4=W+200,pp4=((cam.x*0.58)%sw4+sw4)%sw4;
        for(let i=0;i<5;i++){const tx=((i*200-pp4)%sw4+sw4)%sw4-100;cx.drawImage(sp4,tx-w4/2,GY-h4+2,w4,h4);}
      }
    } else {
      cx.fillStyle='rgba(55,0,80,0.55)';
      cx.beginPath();cx.moveTo(-10,GY);
      for(let x=-(p1%200);x<W+200;x+=200){
        cx.bezierCurveTo(x+40,GY-65,x+90,GY-95,x+100,GY-90);
        cx.bezierCurveTo(x+130,GY-95,x+170,GY-65,x+200,GY);
      }
      cx.lineTo(W+10,GY);cx.closePath();cx.fill();
    }
  }

  if(t.decor==='cloud'){
    cx.fillStyle='rgba(145,190,235,0.38)';
    cx.beginPath();cx.moveTo(-10,GY);
    for(let x=-(p1%280);x<W+280;x+=280){
      cx.lineTo(x+20,GY);cx.lineTo(x+50,GY-75);cx.lineTo(x+90,GY-130);
      cx.lineTo(x+130,GY-80);cx.lineTo(x+160,GY-150);
      cx.lineTo(x+210,GY-100);cx.lineTo(x+255,GY-55);cx.lineTo(x+280,GY);
    }
    cx.lineTo(W+10,GY);cx.closePath();cx.fill();
    cx.fillStyle='rgba(235,248,255,0.55)';
    for(let x=-(p1%280);x<W+280;x+=280){
      cx.beginPath();cx.moveTo(x+90,GY-130);cx.lineTo(x+68,GY-97);cx.lineTo(x+112,GY-97);cx.fill();
      cx.beginPath();cx.moveTo(x+160,GY-150);cx.lineTo(x+136,GY-112);cx.lineTo(x+184,GY-112);cx.fill();
    }
    for(let i=0;i<4;i++){
      const bx=((i*240-p2)%(W+240)+W+240)%(W+240)-120;
      drawCloudShape(bx,GY-68,48,'rgba(195,228,255,0.2)');
    }
  }

  if(t.decor==='star'){
    cx.fillStyle='rgba(5,8,42,0.72)';
    cx.beginPath();cx.moveTo(-10,GY);
    for(let i=0;i<25;i++){
      const bx=((i*38-p1)%(W+38)+W+38)%(W+38)-38;
      const bh=18+((i*31)%32);
      cx.lineTo(bx,GY);cx.lineTo(bx,GY-bh);cx.lineTo(bx+24,GY-bh);cx.lineTo(bx+24,GY);
    }
    cx.lineTo(W+10,GY);cx.closePath();cx.fill();
    cx.fillStyle='rgba(6,12,55,0.94)';
    cx.beginPath();cx.moveTo(-10,GY);
    for(let i=0;i<13;i++){
      const bx=((i*70-p2)%(W+70)+W+70)%(W+70)-70;
      const bh=60+((i*51)%110),bw=30+i%4*10;
      cx.lineTo(bx,GY);cx.lineTo(bx,GY-bh);
      if(i%3===0){cx.lineTo(bx+bw/2-2,GY-bh);cx.lineTo(bx+bw/2,GY-bh-25);cx.lineTo(bx+bw/2+2,GY-bh);}
      else if(i%4===2){cx.lineTo(bx+bw-10,GY-bh);cx.lineTo(bx+bw-10,GY-bh-14);cx.lineTo(bx+bw-3,GY-bh-18);cx.lineTo(bx+bw+3,GY-bh-14);cx.lineTo(bx+bw+3,GY-bh);}
      cx.lineTo(bx+bw,GY-bh);cx.lineTo(bx+bw,GY);
    }
    cx.lineTo(W+10,GY);cx.closePath();cx.fill();
    for(let i=0;i<50;i++){
      const wx=((i*61-p2+18)%(W+61)+W+61)%(W+61)-61;
      const wy=GY-16-((i*33)%78);

  const grad=cx.createLinearGradient(0,0,0,GY);

    }
    const sg=cx.createRadialGradient(W/2,28,0,W/2,28,90);
    sg.addColorStop(0,'rgba(255,255,180,0.88)');sg.addColorStop(0.35,'rgba(255,195,40,0.65)');
    sg.addColorStop(0.7,'rgba(255,130,0,0.25)');sg.addColorStop(1,'rgba(255,80,0,0)');
    cx.fillStyle=sg;cx.beginPath();cx.arc(W/2,28,90,0,Math.PI*2);cx.fill();
  }
  if(t.decor==='rainbow'){
    cx.save();cx.globalAlpha=0.32;
    const rw=500,rx=W/2,ry=GY+90;
    RAINBOW.forEach((clr,i)=>{cx.strokeStyle=clr;cx.lineWidth=22;cx.beginPath();cx.arc(rx,ry,rw-i*22,Math.PI,0);cx.stroke();});
    cx.restore();
  }
  if(t.decor==='bubble'){
    for(let i=0;i<5;i++){
      const lx=55+i*175+Math.sin(gt*0.018+i)*22;
      const lg2=cx.createLinearGradient(lx,0,lx+55,GY*0.72);
      lg2.addColorStop(0,'rgba(80,215,255,0.14)');lg2.addColorStop(1,'rgba(80,215,255,0)');
      cx.fillStyle=lg2;
      cx.beginPath();cx.moveTo(lx-28,0);cx.lineTo(lx+75,GY*0.72);cx.lineTo(lx+20,GY*0.72);cx.lineTo(lx-22,0);cx.fill();
    }
  }

  drawSilhouette();

  const cAlpha=t.decor==='star'?0.07:t.decor==='lava'?0.1:t.decor==='bubble'?0.13:0.9;
  const cClr=t.decor==='star'?`rgba(175,192,255,${cAlpha})`
            :t.decor==='bubble'?`rgba(65,175,200,${cAlpha})`
            :`rgba(255,255,255,${cAlpha})`;
  clouds.forEach(cl=>{
    const bob=Math.sin(gt*0.011+cl.x*0.05)*3;
    drawCloudShape(cl.x,cl.y+bob,cl.r,cClr);
  });

  if(t.decor==='snow'){
    for(let i=0;i<38;i++){
      const sx=((i*173)+gt*(0.22+i%4*0.1))%W,sy=((i*97)+gt*(0.38+i%3*0.13))%(GY-18);
      cx.fillStyle=`rgba(255,255,255,${0.55+i%3*0.15})`;
      cx.beginPath();cx.arc(sx,sy,1.2+i%3*0.9,0,Math.PI*2);cx.fill();
    }
  }
  if(t.decor==='petal'){
    for(let i=0;i<30;i++){
      const sx=((i*173)+gt*(0.28+i%3*0.07))%W,sy=((i*97)+gt*(0.42+i%4*0.1))%(GY-18);
      cx.save();cx.translate(sx,sy);cx.rotate(gt*0.011+i*0.75);
      cx.fillStyle=`rgba(255,${145+i%55},${175+i%60},${0.52+i%3*0.12})`;
      cx.beginPath();cx.ellipse(0,0,6,3,0,0,Math.PI*2);cx.fill();cx.restore();
    }
  }
  if(t.decor==='bubble'){
    for(let i=0;i<15;i++){
      const bx=((i*173+cam.x*0.08)%W+W)%W;
      const by=GY-35-((i*58+gt*(0.32+i%3*0.14))%(GY-58));
      if(by<5)continue;
      cx.strokeStyle=`rgba(145,228,255,0.42)`;cx.lineWidth=1.5;
      cx.beginPath();cx.arc(bx,by,3+i%5*2,0,Math.PI*2);cx.stroke();
      fillC(bx-1.2,by-1.2,1.2,'rgba(255,255,255,0.32)');
    }
  }
  if(t.decor==='lava'){
    for(let i=0;i<9;i++){
      const lx=((i*115+gt*0.72)%(W+100))-50;
      const lg=cx.createLinearGradient(lx,GY-165,lx+18,GY-22);
      lg.addColorStop(0,'rgba(255,55,0,0)');
      lg.addColorStop(0.5,`rgba(255,78,0,${0.09+Math.sin(gt*0.08+i)*0.055})`);
      lg.addColorStop(1,'rgba(255,110,0,0.14)');
      cx.fillStyle=lg;cx.fillRect(lx,GY-165,28,145);
    }
  }
  if(t.decor==='candy'){
    for(let i=0;i<12;i++){
      const sx=((i*185+gt*0.22)%W),sy=((i*108+28)%(GY*0.52));
      cx.strokeStyle=`rgba(255,255,255,${0.14+i%3*0.06})`;cx.lineWidth=2.5;
      cx.beginPath();cx.arc(sx,sy,10+i%4*4,0,Math.PI*1.5);cx.stroke();
    }
  }
  if(t.decor==='mushroom'){
    for(let i=0;i<18;i++){
      const sx=((i*155+gt*(0.18+i%3*0.08))%W),sy=((i*110+20)%(GY*0.65));
      fillC(sx,sy,2+i%2,'rgba(220,180,255,0.35)');
    }
  }
  if(t.decor==='space'){
    for(let i=0;i<110;i++){
      const sx2=(i*137+50)%W,sy2=(i*97+20)%(GY*0.88);
      const blink=Math.max(0,0.2+Math.sin(gt*0.05+i*2.1)*0.65);
      cx.fillStyle=`rgba(255,255,255,${blink})`;cx.fillRect(sx2,sy2,1+i%2,1+i%2);
    }
    for(let i=0;i<3;i++){
      const nxf=110+i*290,nyf=55+i*55;
      const ng=cx.createRadialGradient(nxf,nyf,0,nxf,nyf,80);
      ng.addColorStop(0,`rgba(${60+i*40},${20+i*30},${180+i*25},0.14)`);ng.addColorStop(1,'transparent');
      cx.fillStyle=ng;cx.fillRect(0,0,W,GY);
    }
  }
  if(t.decor==='dino'){
    const sg2=cx.createRadialGradient(W*0.14,42,0,W*0.14,42,62);
    sg2.addColorStop(0,'rgba(255,255,150,0.88)');sg2.addColorStop(0.45,'rgba(255,220,60,0.5)');sg2.addColorStop(1,'transparent');
    cx.fillStyle=sg2;cx.beginPath();cx.arc(W*0.14,42,62,0,Math.PI*2);cx.fill();
  }
  if(t.decor==='magic'){
    for(let i=0;i<22;i++){
      const sx3=((i*185+gt*0.35)%W),sy3=((i*108+20)%(GY*0.72));
      cx.fillStyle=`rgba(${180+i%75},${100+i%100},255,${Math.max(0,0.28+Math.sin(gt*0.08+i)*0.22)})`;
      cx.fillRect(sx3,sy3,2,2);
    }
  }
  if(t.decor==='wave'){
    // Sun over the sea
    const sg=cx.createRadialGradient(W*0.82,38,0,W*0.82,38,70);
    sg.addColorStop(0,'rgba(255,240,160,0.92)');sg.addColorStop(0.4,'rgba(255,200,60,0.55)');sg.addColorStop(1,'transparent');
    cx.fillStyle=sg;cx.beginPath();cx.arc(W*0.82,38,70,0,Math.PI*2);cx.fill();
    // Light sparkles on water
    for(let i=0;i<20;i++){
      const sx4=((i*195+gt*(0.25+i%3*0.08))%W);
      const sy4=GY-22-((i*38+12)%38);
      const alf=Math.max(0,0.35+Math.sin(gt*0.12+i)*0.38);
      cx.fillStyle=`rgba(180,240,255,${alf})`;cx.fillRect(sx4,sy4,3,2);
    }
  }
  if(t.decor==='circus'){
    // Spotlight circles
    for(let i=0;i<4;i++){
      const slx=((i*225+gt*(0.18+i%2*0.1))%W);
      const slg=cx.createRadialGradient(slx,GY,0,slx,GY,120);
      slg.addColorStop(0,`rgba(255,${200+i%55},${50+i%80},0.10)`);slg.addColorStop(1,'transparent');
      cx.fillStyle=slg;cx.fillRect(0,0,W,GY);
    }
    // Confetti dots
    for(let i=0;i<28;i++){
      const sx5=((i*190+gt*(0.30+i%4*0.09))%W);
      const sy5=((i*115+22)%(GY*0.78));
      cx.fillStyle=`rgba(${[255,255,100,100][i%4]},${[100,200,200,255][i%4]},${[100,50,255,100][i%4]},${0.30+i%3*0.08})`;
      cx.fillRect(sx5,sy5,3,3);
    }
  }
}

// ── Ground
function drawGround(){
  const t=th;
  // Clip to non-pit columns: outer ground rect minus pit rects (evenodd)
  cx.save();
  cx.beginPath();
  cx.rect(0,GY-8,W,H-GY+8); // include grass-blade area (GY-8 to H)
  for(const[px,pw] of (sd.pits||[])){
    const l=px-cam.x,r=px+pw-cam.x;
    const dl=Math.max(0,l),dr=Math.min(W,r);
    if(dr>dl)cx.rect(dl,GY-8,dr-dl,H-GY+8);
  }
  cx.clip('evenodd');

  // Ground body
  const grd=cx.createLinearGradient(0,GY,0,H);
  grd.addColorStop(0,t.groundC);grd.addColorStop(1,'rgba(0,0,0,0.6)');
  cx.fillStyle=grd;cx.fillRect(0,GY,W,H-GY);
  // Grass band
  const gGrd=cx.createLinearGradient(0,GY,0,GY+16);
  gGrd.addColorStop(0,t.grassC);gGrd.addColorStop(1,t.groundC);
  cx.fillStyle=gGrd;cx.fillRect(0,GY,W,16);
  // Grass texture (clip handles pit exclusion)
  const offset=cam.x%30;
  for(let x=-offset;x<W+30;x+=30){
    cx.fillStyle='rgba(255,255,255,0.12)';
    cx.beginPath();cx.moveTo(x,GY);cx.lineTo(x+3,GY-6);cx.lineTo(x+7,GY);cx.fill();
    cx.fillStyle='rgba(0,0,0,0.12)';
    cx.beginPath();cx.moveTo(x+15,GY);cx.lineTo(x+18,GY-5);cx.lineTo(x+22,GY);cx.fill();
  }
  // Ground texture lines
  cx.strokeStyle='rgba(0,0,0,0.12)';cx.lineWidth=1;
  for(let y=GY+25;y<H;y+=20){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}

  if(t.decor==='lava'){
    const glow=cx.createLinearGradient(0,GY,0,GY+18);
    glow.addColorStop(0,'rgba(255,90,0,0.8)');glow.addColorStop(1,'transparent');
    cx.fillStyle=glow;cx.fillRect(0,GY,W,18);
    cx.strokeStyle='rgba(255,100,0,0.4)';cx.lineWidth=2;
    for(let i=0;i<7;i++){
      const lx=((i*210-cam.x*0.2)%W+W)%W;
      cx.beginPath();cx.moveTo(lx,GY);cx.lineTo(lx+14,GY+20);cx.lineTo(lx+4,GY+36);cx.stroke();
    }
  }
  if(t.decor==='snow'){
    for(let x=-cam.x%28;x<W+28;x+=28)fillC(x,GY,12,'rgba(255,255,255,0.55)');
  }
  if(t.decor==='bubble'){
    cx.fillStyle='rgba(0,200,200,0.15)';cx.fillRect(0,GY,W,8);
  }
  if(t.decor==='wave'){
    // Sandy shore waveline
    cx.strokeStyle='rgba(210,175,70,0.4)';cx.lineWidth=2;
    cx.beginPath();
    for(let x=0;x<=W;x+=8)cx.lineTo(x,GY+8+Math.sin((x+cam.x*0.5+gt*1.5)*0.04)*3);
    cx.stroke();
    // Pebbles / seashells
    for(let i=0;i<18;i++){
      const px2=((i*178-cam.x*0.2)%W+W)%W;
      cx.fillStyle=`rgba(200,160,60,${0.3+i%3*0.1})`;
      cx.beginPath();cx.ellipse(px2,GY+6+i%4*3,4+i%3*2,2+i%2,i*0.5,0,Math.PI*2);cx.fill();
    }
  }
  if(t.decor==='circus'){
    // Sawdust stripe
    cx.fillStyle='rgba(255,200,0,0.18)';
    for(let x=-cam.x%42;x<W+42;x+=42)cx.fillRect(x,GY,21,5);
  }

  cx.restore(); // remove clip — background shows through pits naturally

  // Pit: mirror sky into pit interior + cliff edges
  if(sd.pits&&sd.pits.length){
    const cvs=cx.canvas;
    for(const[px,pw] of sd.pits){
      const sx=px-cam.x,ex=px+pw-cam.x;
      if(ex<-5||sx>W+5)continue;
      const dsx=Math.max(0,sx),dex=Math.min(W,ex),dw=dex-dsx;
      if(dw<=0)continue;
      // Reflect sky (y=0..GY) into pit (y=GY..H) — transform: flip y around GY, compress to fit
      cx.save();
      cx.beginPath();cx.rect(dsx,GY,dw,H-GY);cx.clip();
      cx.translate(0,H);cx.scale(1,-(H-GY)/GY);
      cx.drawImage(cvs,0,0);
      cx.restore();
      // Subtle darkening so pit reads as deeper than the sky
      const dep=cx.createLinearGradient(0,GY,0,H);
      dep.addColorStop(0,'rgba(0,0,0,0.05)');dep.addColorStop(1,'rgba(0,0,0,0.5)');
      cx.fillStyle=dep;cx.fillRect(dsx,GY,dw,H-GY);
      // Left cliff edge: grass lip + shadow
      if(sx>=0&&sx<=W){
        const gl=cx.createLinearGradient(0,GY-3,0,GY+10);
        gl.addColorStop(0,t.grassC);gl.addColorStop(1,'transparent');
        cx.fillStyle=gl;cx.fillRect(Math.max(0,sx-3),GY-3,7,13);
        const lsh=cx.createLinearGradient(sx,0,sx+30,0);
        lsh.addColorStop(0,'rgba(0,0,0,0.45)');lsh.addColorStop(1,'transparent');
        cx.fillStyle=lsh;cx.fillRect(sx,GY,30,H-GY);
      }
      // Right cliff edge: grass lip + shadow
      if(ex>0&&ex<=W){
        const gl=cx.createLinearGradient(0,GY-3,0,GY+10);
        gl.addColorStop(0,t.grassC);gl.addColorStop(1,'transparent');
        cx.fillStyle=gl;cx.fillRect(Math.min(W,ex)-4,GY-3,7,13);
        const rsh=cx.createLinearGradient(ex-30,0,ex,0);
        rsh.addColorStop(0,'transparent');rsh.addColorStop(1,'rgba(0,0,0,0.45)');
        cx.fillStyle=rsh;cx.fillRect(Math.max(0,ex-30),GY,30,H-GY);
      }
    }
  }
}

// ── Platforms
function platGrad(sx,py,pw,topClr,midClr,botClr){
  const g=cx.createLinearGradient(sx,py,sx,py+PLAT_H);
  g.addColorStop(0,topClr);g.addColorStop(0.35,midClr);g.addColorStop(1,botClr);
  return g;
}
function drawPlatforms(){
  const t=th;
  sd.plats.forEach(([px,py,pw],idx)=>{
    const sx=px-cam.x;
    if(sx+pw<0||sx>W)return;

    if(t.decor==='mushroom'){
      // 3D mushroom cap
      cx.fillStyle=platGrad(sx,py,pw,'#ef9a9a','#c62828','#8b0000');cx.fillRect(sx,py,pw,PLAT_H);
      fillR(sx,py,pw,5,'rgba(255,200,200,0.7)');
      fillR(sx,py+PLAT_H-3,pw,3,'rgba(0,0,0,0.3)');
      [0.15,0.38,0.62,0.85].forEach(r=>{fillC(sx+pw*r,py+PLAT_H*0.55,5,'rgba(255,255,255,0.7)');});
      fillR(sx+pw*0.38,py+PLAT_H,pw*0.24,6,'#5d4037');
      return;
    }
    if(t.decor==='cloud'){
      const numBumps=Math.max(3,Math.floor(pw/32));
      cx.fillStyle='rgba(240,250,255,0.97)';
      for(let i=0;i<numBumps;i++){
        const bx=sx+pw*((i+0.5)/numBumps);
        cx.beginPath();cx.arc(bx,py+6,PLAT_H*0.9,0,Math.PI*2);cx.fill();
      }
      fillR(sx,py+8,pw,PLAT_H-4,'rgba(240,250,255,0.97)');
      cx.fillStyle='rgba(180,220,255,0.5)';cx.fillRect(sx,py+PLAT_H-4,pw,4);
      return;
    }
    if(t.decor==='lava'){
      // Dark stone with glow
      cx.fillStyle=platGrad(sx,py,pw,'#5d4037','#3e2723','#1a0a00');cx.fillRect(sx,py,pw,PLAT_H);
      fillR(sx,py,pw,3,'rgba(255,90,0,0.6)');
      fillR(sx,py+PLAT_H-2,pw,2,'rgba(0,0,0,0.5)');
      cx.strokeStyle='rgba(100,50,20,0.5)';cx.lineWidth=1;
      for(let i=0;i<pw;i+=40){cx.beginPath();cx.moveTo(sx+i,py);cx.lineTo(sx+i,py+PLAT_H);cx.stroke();}
      return;
    }
    if(t.decor==='candy'){
      cx.fillStyle=platGrad(sx,py,pw,'#ff80c0','#e91e63','#ad1457');cx.fillRect(sx,py,pw,PLAT_H);
      const sw2=20;cx.fillStyle='rgba(255,255,255,0.3)';
      for(let i=0;i<pw;i+=sw2*2)cx.fillRect(sx+i,py,sw2,PLAT_H);
      fillR(sx,py,pw,4,'rgba(255,220,240,0.7)');fillR(sx,py+PLAT_H-2,pw,2,'rgba(0,0,0,0.2)');
      return;
    }
    if(t.decor==='star'){
      cx.fillStyle=platGrad(sx,py,pw,'#1e88e5','#0d47a1','#060c2e');cx.fillRect(sx,py,pw,PLAT_H);
      fillR(sx,py,pw,5,'#ffd600');fillR(sx,py+PLAT_H-2,pw,2,'rgba(0,0,0,0.4)');
      [0.2,0.5,0.8].forEach(r=>{fillC(sx+pw*r,py+PLAT_H/2,2.5,'rgba(255,230,50,0.8)');});
      return;
    }
    if(t.decor==='snow'){
      cx.fillStyle=platGrad(sx,py,pw,'#b3e5fc','#4fc3f7','#0288d1');cx.fillRect(sx,py,pw,PLAT_H);
      fillR(sx,py,pw,6,'#ffffff');fillR(sx,py+PLAT_H-2,pw,2,'rgba(0,0,0,0.2)');
      // Icicles
      cx.fillStyle='rgba(180,235,255,0.85)';
      for(let i=5;i<pw-5;i+=15){
        cx.beginPath();cx.moveTo(sx+i,py+PLAT_H);cx.lineTo(sx+i+5,py+PLAT_H);cx.lineTo(sx+i+2.5,py+PLAT_H+10);cx.fill();
      }
      return;
    }
    if(t.decor==='rainbow'){
      const clr=RAINBOW[idx%RAINBOW.length];
      cx.fillStyle=clr;cx.fillRect(sx,py,pw,PLAT_H);
      fillR(sx,py,pw,5,'rgba(255,255,255,0.6)');fillR(sx,py+PLAT_H-2,pw,2,'rgba(0,0,0,0.2)');
      return;
    }
    if(t.decor==='gold'){
      cx.fillStyle=platGrad(sx,py,pw,'#fff176','#f9a825','#e65100');cx.fillRect(sx,py,pw,PLAT_H);
      fillR(sx,py,pw,5,'rgba(255,255,200,0.8)');fillR(sx,py+PLAT_H-2,pw,2,'rgba(0,0,0,0.3)');
      // Shimmer
      cx.fillStyle='rgba(255,255,255,0.3)';
      cx.beginPath();cx.ellipse(sx+pw*0.5,py+PLAT_H*0.35,pw*0.3,PLAT_H*0.2,0,0,Math.PI*2);cx.fill();
      cx.strokeStyle='rgba(180,120,0,0.35)';cx.lineWidth=1;
      for(let i=0;i<pw;i+=38){cx.beginPath();cx.moveTo(sx+i,py);cx.lineTo(sx+i,py+PLAT_H);cx.stroke();}
      return;
    }
    if(t.decor==='petal'){
      cx.fillStyle=platGrad(sx,py,pw,'#f48fb1','#e91e63','#880e4f');cx.fillRect(sx,py,pw,PLAT_H);
      fillR(sx,py,pw,5,'rgba(255,230,240,0.7)');fillR(sx,py+PLAT_H-2,pw,2,'rgba(0,0,0,0.2)');
      [0.15,0.35,0.55,0.75,0.92].forEach(r=>{
        cx.fillStyle='rgba(255,200,220,0.7)';
        cx.beginPath();cx.ellipse(sx+pw*r,py+4,5,3,0.3,0,Math.PI*2);cx.fill();
      });
      return;
    }
    if(t.decor==='bubble'){
      cx.fillStyle=platGrad(sx,py,pw,'#80deea','#00838f','#004d40');cx.fillRect(sx,py,pw,PLAT_H);
      fillR(sx,py,pw,5,'rgba(200,245,255,0.75)');fillR(sx,py+PLAT_H-2,pw,2,'rgba(0,0,0,0.2)');
      cx.fillStyle='rgba(150,240,255,0.25)';cx.fillRect(sx,py,pw,PLAT_H);
      return;
    }
    if(t.decor==='space'){
      cx.fillStyle=platGrad(sx,py,pw,'#7c4dff','#311b92','#1a0050');cx.fillRect(sx,py,pw,PLAT_H);
      fillR(sx,py,pw,4,'rgba(180,140,255,0.7)');fillR(sx,py+PLAT_H-2,pw,2,'rgba(0,0,0,0.5)');
      cx.strokeStyle='rgba(120,80,255,0.4)';cx.lineWidth=1;
      for(let i=5;i<pw-5;i+=28){cx.beginPath();cx.moveTo(sx+i,py+2);cx.lineTo(sx+i,py+PLAT_H-2);cx.stroke();}
      if(Math.floor(gt/20+idx)%3!==0){fillC(sx+8,py+PLAT_H/2,3,'rgba(0,255,200,0.9)');fillC(sx+pw-8,py+PLAT_H/2,3,'rgba(255,80,80,0.9)');}
      return;
    }
    if(t.decor==='dino'){
      cx.fillStyle=platGrad(sx,py,pw,'#a5d6a7','#388e3c','#1b5e20');cx.fillRect(sx,py,pw,PLAT_H);
      fillR(sx,py,pw,5,'#c8e6c9');fillR(sx,py+PLAT_H-2,pw,2,'rgba(0,0,0,0.25)');
      cx.fillStyle='rgba(100,180,60,0.6)';
      for(let i=8;i<pw-8;i+=22){cx.beginPath();cx.arc(sx+i,py+2,5,Math.PI,0);cx.fill();}
      return;
    }
    if(t.decor==='magic'){
      const glow=0.6+Math.sin(gt*0.12+idx*0.8)*0.25;
      cx.fillStyle=platGrad(sx,py,pw,'#e1bee7',`rgba(123,31,162,${glow})`,'#4a0072');cx.fillRect(sx,py,pw,PLAT_H);
      fillR(sx,py,pw,5,'rgba(240,200,255,0.8)');fillR(sx,py+PLAT_H-2,pw,2,'rgba(0,0,0,0.3)');
      cx.fillStyle='rgba(200,150,255,0.5)';
      for(let i=8;i<pw-8;i+=18){cx.beginPath();cx.moveTo(sx+i,py);cx.lineTo(sx+i+4,py-6);cx.lineTo(sx+i+8,py);cx.fill();}
      return;
    }
    if(t.decor==='wave'){
      cx.fillStyle=platGrad(sx,py,pw,'#a8dadc','#2a9d8f','#1a6b62');cx.fillRect(sx,py,pw,PLAT_H);
      fillR(sx,py,pw,5,'rgba(220,250,255,0.7)');fillR(sx,py+PLAT_H-2,pw,2,'rgba(0,0,0,0.2)');
      // Coral texture bumps
      cx.fillStyle='rgba(255,180,100,0.45)';
      for(let i=8;i<pw-8;i+=22){cx.beginPath();cx.arc(sx+i,py+3,4,Math.PI,0);cx.fill();}
      return;
    }
    if(t.decor==='circus'){
      const ci=Math.floor(px/300)%4;
      const cols=['#e63946','#f7b731','#7b2d8b','#2a9d8f'];
      const tops=['#ff8085','#ffe082','#b06bbf','#4db6ac'];
      cx.fillStyle=platGrad(sx,py,pw,tops[ci],cols[ci],'rgba(0,0,0,0.35)');cx.fillRect(sx,py,pw,PLAT_H);
      cx.fillStyle='rgba(255,255,255,0.28)';
      for(let i=0;i<pw;i+=22)cx.fillRect(sx+i,py,11,PLAT_H);
      fillR(sx,py,pw,5,'rgba(255,255,255,0.5)');fillR(sx,py+PLAT_H-2,pw,2,'rgba(0,0,0,0.25)');
      return;
    }
    // Default 3D
    cx.fillStyle=platGrad(sx,py,pw,t.platTop,t.platC,'rgba(0,0,0,0.35)');cx.fillRect(sx,py,pw,PLAT_H);
    fillR(sx,py,pw,4,'rgba(255,255,255,0.4)');
    fillR(sx,py+PLAT_H-2,pw,2,'rgba(0,0,0,0.3)');
    cx.strokeStyle='rgba(0,0,0,0.12)';cx.lineWidth=1;
    for(let i=0;i<pw;i+=40){cx.beginPath();cx.moveTo(sx+i,py+5);cx.lineTo(sx+i,py+PLAT_H-2);cx.stroke();}
  });
}

// ── Coins
function drawCoins(){
  const t=th;
  const coinC=t.decor==='star'?'#80d8ff':t.decor==='snow'?'#e3f2fd':t.decor==='gold'?'#fff176':'#ffd600';
  const shinC=t.decor==='gold'?'#ffffff':'rgba(255,255,255,0.6)';
  coins.forEach(c=>{
    if(c.collected)return;
    const sx=c.x-cam.x;if(sx<-30||sx>W+30)return;
    const bob=Math.sin(gt*0.08+c.x*0.05)*3;
    const spinW=Math.abs(Math.sin(gt*0.13+c.x*0.04))*9+2;
    cx.fillStyle=coinC;
    cx.beginPath();cx.ellipse(sx+c.w/2,c.y+c.h/2+bob,spinW,10,0,0,Math.PI*2);cx.fill();
    if(spinW>5){
      cx.fillStyle=shinC;
      cx.beginPath();cx.ellipse(sx+c.w/2-spinW*0.25,c.y+c.h/2+bob-2,spinW*0.25,5,0,0,Math.PI*2);cx.fill();
    }
  });
}

// ── Flag
function drawFlag(){
  const sx=sd.flag-cam.x;
  if(sx<-60||sx>W+60)return;
  const fy=(stageNum===7&&mech.flagY!==undefined)?mech.flagY:0;
  // 카메라 흔들림 (Stage 7 보스 사망 후 깃발 올라올 때)
  const shk=(stageNum===7&&mech.shake>0)?(Math.random()*6-3):0;
  cx.save();
  if(fy>0){cx.beginPath();cx.rect(sx-20,0,100,GY);cx.clip();}
  cx.translate(shk,fy);
  // Pole shadow
  fillR(sx+12,GY-220,4,220,'rgba(0,0,0,0.25)');
  // Pole
  const pGrd=cx.createLinearGradient(sx+8,0,sx+16,0);
  pGrd.addColorStop(0,'#e0e0e0');pGrd.addColorStop(0.4,'#fff');pGrd.addColorStop(1,'#9e9e9e');
  cx.fillStyle=pGrd;cx.fillRect(sx+8,GY-222,8,222);
  // Flag
  const wave=Math.sin(gt*0.09)*5;
  const fg=cx.createLinearGradient(sx+16,GY-222,sx+70,GY-172);
  fg.addColorStop(0,'#ef5350');fg.addColorStop(1,'#c62828');
  cx.fillStyle=fg;cx.beginPath();
  cx.moveTo(sx+16,GY-222);cx.lineTo(sx+66+wave,GY-198);cx.lineTo(sx+16,GY-172);cx.closePath();cx.fill();
  txtS('골!',sx+40+wave/2,GY-198,13,'#fff','#c62828');
  // Base
  fillRR(sx-8,GY-6,40,22,5,'#757575');
  fillR(sx-6,GY-6,36,4,'rgba(255,255,255,0.2)');
  cx.restore();
}

// ── Stage mechanics draw
function drawMechanic(){
  const n=stageNum;

  if(n===3&&mech.stars){
    for(const s of mech.stars){
      if(s.collected)continue;
      const sx=s.x-cam.x;
      if(sx<-40||sx>W+40)continue;
      const bob=Math.sin(gt*0.11+s.x*0.04)*5;
      const sz=18+Math.sin(gt*0.18)*2;
      cx.save();
      cx.shadowColor='rgba(255,220,0,0.8)';cx.shadowBlur=12;
      cx.font=`${sz}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText('⭐',sx,s.y+bob);
      cx.restore();
    }
    if(mech.starTimer>0&&!player.dead){
      const alpha=(0.25+Math.sin(gt*0.35)*0.18)*(mech.starTimer<60?mech.starTimer/60:1);
      cx.globalAlpha=alpha;
      fillC(player.x-cam.x+PW/2,player.y+PH/2,PH*0.85,'#ffd600');
      cx.globalAlpha=1;
    }
  }

  if(n===4&&mech.lemmings){
    const LW=16,LH=24;
    const hats=['#e53935','#1e88e5','#43a047'];
    for(let i=0;i<mech.lemmings.length;i++){
      const l=mech.lemmings[i];
      if(!l.alive)continue;
      const sx=l.x-cam.x;
      const dir=l.vx>=0?1:-1;
      // Body
      fillRR(sx,l.y,LW,LH-6,3,hats[i]);
      // Head
      fillC(sx+LW/2,l.y-7,8,'#ffcc99');
      // Hardhat
      cx.fillStyle='#ffd600';cx.beginPath();
      cx.ellipse(sx+LW/2,l.y-12,9,5,0,Math.PI,0);cx.fill();
      fillR(sx+LW/2-10,l.y-14,20,4,'#ffd600');
      // Eye
      fillC(sx+LW/2+dir*3,l.y-8,2,'#333');
    }
  }

  if(n===5&&mech.lavaY!==undefined){
    const ly=mech.lavaY;
    if(ly>=H)return;
    // Glow
    const grd=cx.createLinearGradient(0,ly-40,0,ly);
    grd.addColorStop(0,'rgba(255,100,0,0)');grd.addColorStop(1,'rgba(255,100,0,0.45)');
    cx.fillStyle=grd;cx.fillRect(0,ly-40,W,40);
    // Lava body
    cx.fillStyle='#bf360c';cx.fillRect(0,ly+8,W,H-ly-8);
    // Wavy surface
    cx.fillStyle='#f4511e';
    cx.beginPath();cx.moveTo(0,ly);
    for(let x=0;x<=W;x+=10){
      const wy=ly+Math.sin((x+gt*3)*0.055)*7;
      cx.lineTo(x,wy);
    }
    cx.lineTo(W,H);cx.lineTo(0,H);cx.closePath();cx.fill();
    // Bright surface
    cx.fillStyle='rgba(255,150,50,0.5)';
    cx.beginPath();cx.moveTo(0,ly);
    for(let x=0;x<=W;x+=10){
      const wy=ly+Math.sin((x+gt*2)*0.07+1.5)*4;
      cx.lineTo(x,wy);
    }
    cx.lineTo(W,ly+6);cx.lineTo(0,ly+6);cx.closePath();cx.fill();
    // Lava blobs
    for(let i=0;i<6;i++){
      const bx=((i*175+gt*2)%W);
      const bs=7+Math.sin(gt*0.12+i)*3;
      fillC(bx,ly-bs*0.4,bs,'rgba(255,170,50,0.8)');
    }
  }

  if(n===6&&mech.bubbles){
    for(const b of mech.bubbles){
      const sx=b.x-cam.x;
      if(sx+b.w<0||sx>W)continue;
      cx.strokeStyle='rgba(130,210,255,0.7)';cx.lineWidth=2;
      cx.fillStyle='rgba(180,240,255,0.28)';
      cx.beginPath();cx.roundRect(sx,b.y,b.w,b.h,7);cx.fill();cx.stroke();
      fillC(sx+b.w*0.2,b.y+b.h*0.3,4,'rgba(255,255,255,0.65)');
    }
  }

  if(n===7&&mech.boss){
    const boss=mech.boss;
    if(boss.dead){
      if(boss.deadTimer>0){
        const sx=boss.x-cam.x;
        cx.globalAlpha=boss.deadTimer/150;
        for(let i=0;i<12;i++){
          const a=gt*0.15+i*(Math.PI*2/12);
          const r=30+Math.sin(gt*0.2+i)*15;
          fillC(sx+boss.w/2+Math.cos(a)*r,boss.y+boss.h/2+Math.sin(a)*r*0.6,
                5+i%3*3,['#ffd600','#ff5722','#e91e63','#7c4dff'][i%4]);
        }
        cx.globalAlpha=1;
      }
      return;
    }
    const sx=boss.x-cam.x;
    if(sx+boss.w<-20||sx>W+20)return;
    const flash=boss.flash>0&&Math.floor(boss.flash/3)%2===0;
    // Shadow
    cx.fillStyle='rgba(0,0,0,0.2)';cx.beginPath();cx.ellipse(sx+boss.w/2,GY+4,boss.w*0.5,8,0,0,Math.PI*2);cx.fill();
    // Boss body
    const bClr=boss.phase===2?'#880000':'#c62828';
    const bTop=boss.phase===2?'#cc0000':'#ef5350';
    cx.fillStyle=flash?'#fff':platGrad(sx,boss.y,boss.w,bTop,bClr,'#4a0000');
    cx.fillRect(sx,boss.y,boss.w,boss.h);
    if(!flash){
      fillR(sx,boss.y,boss.w,4,'rgba(255,255,255,0.2)');
      fillR(sx,boss.y+boss.h-3,boss.w,3,'rgba(0,0,0,0.4)');
    }
    // Eyes
    const ey=boss.phase===2?'#ff1744':'#ffd600';
    fillC(sx+boss.w*0.28,boss.y+boss.h*0.3,11,flash?'#000':'#fff');
    fillC(sx+boss.w*0.72,boss.y+boss.h*0.3,11,flash?'#000':'#fff');
    fillC(sx+boss.w*0.28,boss.y+boss.h*0.3,6,flash?'#fff':ey);
    fillC(sx+boss.w*0.72,boss.y+boss.h*0.3,6,flash?'#fff':ey);
    fillC(sx+boss.w*0.3,boss.y+boss.h*0.28,3,'#111');
    fillC(sx+boss.w*0.74,boss.y+boss.h*0.28,3,'#111');
    // Angry brow
    cx.strokeStyle='#111';cx.lineWidth=3.5;cx.lineCap='round';
    cx.beginPath();cx.moveTo(sx+boss.w*0.15,boss.y+boss.h*0.18);cx.lineTo(sx+boss.w*0.4,boss.y+boss.h*0.24);cx.stroke();
    cx.beginPath();cx.moveTo(sx+boss.w*0.85,boss.y+boss.h*0.18);cx.lineTo(sx+boss.w*0.6,boss.y+boss.h*0.24);cx.stroke();
    // Mouth
    cx.beginPath();cx.moveTo(sx+boss.w*0.22,boss.y+boss.h*0.68);
    cx.lineTo(sx+boss.w*0.38,boss.y+boss.h*0.76);
    cx.lineTo(sx+boss.w*0.62,boss.y+boss.h*0.76);
    cx.lineTo(sx+boss.w*0.78,boss.y+boss.h*0.68);cx.stroke();
    // Word label
    txtS(WORDS[17],sx+boss.w/2,boss.y+boss.h*0.52,15,'#fff','rgba(0,0,0,0.6)');
    // HP bar above boss
    fillRR(sx,boss.y-26,boss.w,13,4,'rgba(0,0,0,0.6)');
    const hpW=boss.w*(boss.hp/boss.maxHp);
    fillRR(sx+1,boss.y-25,hpW-2,11,3,boss.phase===2?'#ff1744':'#ef5350');
    fillR(sx+2,boss.y-25,Math.max(0,hpW-4),4,'rgba(255,255,255,0.25)');
    txt(`HP ${boss.hp}/${boss.maxHp}`,sx+boss.w/2,boss.y-19,9,'#fff');
    txtS('BOSS',sx+boss.w/2,boss.y-38,11,'#ffd600','#000');
  }

  if(n===8&&mech.boostPads){
    for(const p of mech.boostPads){
      const sx=p.x-cam.x;
      if(sx+p.w<0||sx>W)continue;
      const glow=0.5+Math.sin(gt*0.18)*0.35;
      // Pad glow
      const pg=cx.createLinearGradient(sx,p.y,sx,p.y+p.h);
      pg.addColorStop(0,`rgba(0,255,160,${glow})`);pg.addColorStop(1,`rgba(0,180,80,${glow*0.5})`);
      cx.fillStyle=pg;cx.fillRect(sx,p.y,p.w,p.h);
      // Arrows
      cx.fillStyle=`rgba(255,255,255,${0.7+glow*0.3})`;
      cx.font='bold 9px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
      for(let i=0;i<3;i++)cx.fillText('▶',sx+20+i*26,p.y+p.h/2+1);
    }
    if(mech.boostTimer>0){
      const a=(mech.boostTimer/75)*0.35;
      for(let i=0;i<6;i++){
        const lx=((i*160-gt*10*mech.boostDir+W*2)%W);
        const ly=H*0.3+i*45+Math.sin(gt*0.08+i)*20;
        cx.strokeStyle=`rgba(0,255,160,${a})`;cx.lineWidth=2.5;
        cx.beginPath();cx.moveTo(lx,ly);cx.lineTo(lx-mech.boostDir*50,ly);cx.stroke();
      }
    }
  }

  if(n===9&&mech.icePuffs){
    for(const p of mech.icePuffs){
      cx.globalAlpha=p.life/22;
      fillC(p.x,p.y,3.5,'rgba(200,235,255,0.9)');
      cx.globalAlpha=1;
    }
  }

  // ── Stage 11: UFO draw
  if(n===11&&mech.ufos){
    for(const u of mech.ufos){
      const usx=u.x-cam.x;
      if(usx+85<0||usx-85>W)continue;
      const uy=68+Math.sin(gt*0.08+u.x*0.004)*4;
      // Glow
      cx.globalAlpha=0.22;
      const ug=cx.createRadialGradient(usx,uy+6,4,usx,uy+6,50);
      ug.addColorStop(0,'rgba(0,200,255,0.55)');ug.addColorStop(1,'transparent');
      cx.fillStyle=ug;cx.beginPath();cx.arc(usx,uy+6,50,0,Math.PI*2);cx.fill();cx.globalAlpha=1;
      // Dome
      cx.fillStyle='rgba(115,115,195,0.92)';cx.beginPath();cx.ellipse(usx,uy-4,21,13,0,Math.PI,0);cx.fill();
      // Rim
      const uf=cx.createLinearGradient(usx-42,uy,usx+42,uy);
      uf.addColorStop(0,'rgba(75,75,155,0.92)');uf.addColorStop(0.5,'rgba(175,175,255,0.96)');uf.addColorStop(1,'rgba(75,75,155,0.92)');
      cx.fillStyle=uf;cx.beginPath();cx.ellipse(usx,uy,42,10,0,0,Math.PI*2);cx.fill();
      // Lights
      const lOn=Math.floor(gt/12)%2===0;
      [-20,-10,0,10,20].forEach((dx,i)=>{fillC(usx+dx,uy+5,3.5,lOn&&i%2===0?'#00ffff':'rgba(0,90,140,0.5)');});
      // Laser
      if(u.laser&&u.laser.active){
        const lsx=u.laser.x-cam.x;
        const lg=cx.createLinearGradient(lsx,u.laser.y-62,lsx,u.laser.y);
        lg.addColorStop(0,'rgba(0,255,200,0)');lg.addColorStop(0.5,'rgba(0,255,200,0.8)');lg.addColorStop(1,'rgba(100,255,255,1)');
        cx.fillStyle=lg;cx.fillRect(lsx-4,u.laser.y-62,8,62);
        fillC(lsx,u.laser.y,5,'rgba(150,255,255,0.9)');
      }
    }
  }

  // ── Stage 12: Stomp legs + missile plants draw
  if(n===12&&mech.stompLegs){
    const LW=58,LH=115;
    for(const l of mech.stompLegs){
      const lsx=l.x-cam.x;
      if(lsx+LW<-10||lsx-LW>W+10)continue;
      if(l.shadow>0){
        cx.globalAlpha=l.shadow;cx.fillStyle='rgba(0,0,0,0.58)';
        cx.beginPath();cx.ellipse(lsx,GY+3,LW*0.55,7,0,0,Math.PI*2);cx.fill();cx.globalAlpha=1;
      }
      if(l.phase==='idle')continue;
      const lTop=l.y;if(lTop+LH<0)continue;
      cx.fillStyle='#6d4c41';cx.fillRect(lsx-LW/2,lTop,LW,LH*0.65);
      cx.fillStyle='rgba(255,255,255,0.1)';cx.fillRect(lsx-LW/2,lTop,LW,4);
      cx.fillStyle='rgba(0,0,0,0.18)';cx.fillRect(lsx-LW/2,lTop+LH*0.65-2,LW,4);
      cx.fillStyle='#8d6e63';cx.beginPath();cx.ellipse(lsx,lTop+LH*0.65,LW*0.55,LW*0.4,0,0,Math.PI*2);cx.fill();
      cx.fillStyle='#795548';cx.fillRect(lsx-LW*0.42,lTop+LH*0.65,LW*0.84,LH*0.35);
      cx.fillStyle='#4e342e';cx.beginPath();cx.ellipse(lsx,lTop+LH,LW*0.68,17,0,0,Math.PI*2);cx.fill();
      [-1,0,1].forEach(ti=>{cx.fillStyle='#3e2723';cx.beginPath();cx.ellipse(lsx+ti*17,lTop+LH+4,9,13,ti*0.15,0,Math.PI);cx.fill();});
      cx.strokeStyle='rgba(0,0,0,0.14)';cx.lineWidth=2;
      for(let i=10;i<LH*0.6;i+=14){cx.beginPath();cx.moveTo(lsx-LW/2+2,lTop+i);cx.lineTo(lsx+LW/2-2,lTop+i);cx.stroke();}
    }
    for(const p of mech.mPlants){
      const psx=p.x-cam.x;if(psx<-45||psx>W+45)continue;
      // 줄기 (어두운 outline + 본체)
      cx.lineCap='round';
      cx.strokeStyle='#1b3a18';cx.lineWidth=9;
      cx.beginPath();cx.moveTo(psx,GY);cx.quadraticCurveTo(psx-8,GY-22,psx,GY-38);cx.stroke();
      cx.strokeStyle='#558b2f';cx.lineWidth=5;
      cx.beginPath();cx.moveTo(psx,GY);cx.quadraticCurveTo(psx-8,GY-22,psx,GY-38);cx.stroke();
      // 작은 가지
      cx.strokeStyle='#1b3a18';cx.lineWidth=6;
      cx.beginPath();cx.moveTo(psx,GY-20);cx.quadraticCurveTo(psx+12,GY-30,psx+16,GY-43);cx.stroke();
      cx.strokeStyle='#7cb342';cx.lineWidth=3;
      cx.beginPath();cx.moveTo(psx,GY-20);cx.quadraticCurveTo(psx+12,GY-30,psx+16,GY-43);cx.stroke();
      // 잎 (outline)
      cx.fillStyle='#7cb342';cx.strokeStyle='#1b3a18';cx.lineWidth=1.8;
      cx.beginPath();cx.ellipse(psx-12,GY-22,13,6,0.5,0,Math.PI*2);cx.fill();cx.stroke();
      const charge=p.t<45?(45-p.t)/45:0;
      // 꽃잎 (검정 outline + 빨강·주황 본체)
      cx.strokeStyle='#5a0e0e';cx.lineWidth=1.5;
      for(let pi=0;pi<6;pi++){
        const pa=pi*(Math.PI/3)+gt*0.04;
        cx.fillStyle=`rgb(${charge>0.5?255:255},${charge>0.5?45:120},${charge>0.5?45:30})`;
        cx.beginPath();cx.ellipse(psx+Math.cos(pa)*8,GY-38+Math.sin(pa)*8,5.5,7.5,pa,0,Math.PI*2);cx.fill();cx.stroke();
      }
      // 꽃 중앙 (검정 outline + 노랑)
      cx.fillStyle='#ffd600';cx.strokeStyle='#5a3a00';cx.lineWidth=1.5;
      cx.beginPath();cx.arc(psx,GY-38,6.5,0,Math.PI*2);cx.fill();cx.stroke();
      // 미사일 (어두운 outline + 빨강·노랑 본체 + 흰 highlight)
      for(const pr of p.projs){
        if(!pr.active)continue;const prsx=pr.x-cam.x;if(prsx<-22||prsx>W+22)continue;
        cx.fillStyle='#3a0000';
        cx.beginPath();cx.arc(prsx,pr.y,11,0,Math.PI*2);cx.fill();
        const pg=cx.createRadialGradient(prsx-2,pr.y-2,1,prsx,pr.y,9);
        pg.addColorStop(0,'#ffeb3b');pg.addColorStop(0.45,'#ff5722');pg.addColorStop(1,'#b71c1c');
        cx.fillStyle=pg;cx.beginPath();cx.arc(prsx,pr.y,9,0,Math.PI*2);cx.fill();
        cx.fillStyle='rgba(255,255,255,0.9)';cx.beginPath();cx.arc(prsx-2.5,pr.y-2.5,2.5,0,Math.PI*2);cx.fill();
      }
    }
  }

  // ── Stage 13: Magic orbs + bolt cannons draw
  if(n===13&&mech.magicOrbs){
    for(const o of mech.magicOrbs){
      const osx=o.wx-cam.x;if(osx+32<-10||osx-32>W+10)continue;
      const hue=(gt*2+o.wx*0.1)%360;
      const og=cx.createRadialGradient(osx,o.y,2,osx,o.y,28);
      og.addColorStop(0,`hsla(${hue},100%,76%,0.72)`);og.addColorStop(0.6,`hsla(${hue},80%,52%,0.3)`);og.addColorStop(1,'transparent');
      cx.fillStyle=og;cx.beginPath();cx.arc(osx,o.y,28,0,Math.PI*2);cx.fill();
      cx.fillStyle=`hsla(${hue},90%,82%,0.96)`;cx.beginPath();cx.arc(osx,o.y,14,0,Math.PI*2);cx.fill();
      cx.fillStyle='rgba(255,255,255,0.9)';cx.beginPath();cx.arc(osx-4,o.y-4,3.5,0,Math.PI*2);cx.fill();
      for(let pi=0;pi<3;pi++){
        const pa=gt*0.12+pi*(Math.PI*2/3)+o.ph;
        fillC(osx+Math.cos(pa)*20,o.y+Math.sin(pa)*20*0.55,3,`hsla(${(hue+120*pi)%360},100%,82%,0.8)`);
      }
    }
    for(const c of mech.mCannons){
      const csx=c.x-cam.x;if(csx<-32||csx>W+32)continue;
      const charge=c.t<55?(55-c.t)/55:0;
      // 외곽 어두운 ring + 금색 ring (보라 BG에서 명확)
      cx.strokeStyle='#1a0033';cx.lineWidth=4;
      cx.beginPath();cx.arc(csx,c.y,18,0,Math.PI*2);cx.stroke();
      cx.strokeStyle=`rgba(255,215,0,${0.85+charge*0.15})`;cx.lineWidth=2.5;
      cx.beginPath();cx.arc(csx,c.y,18,0,Math.PI*2);cx.stroke();
      // 내부 회전 호 (밝은 색)
      cx.strokeStyle=`rgba(255,235,140,${0.55+charge*0.4})`;cx.lineWidth=2;
      cx.beginPath();cx.arc(csx,c.y,12,gt*0.08,gt*0.08+Math.PI*1.5);cx.stroke();
      if(charge>0.35){cx.globalAlpha=charge*0.55;cx.fillStyle='rgba(255,235,80,0.55)';cx.beginPath();cx.arc(csx,c.y,18,0,Math.PI*2);cx.fill();cx.globalAlpha=1;}
    }
    for(const b of mech.mBolts){
      if(!b.active)continue;const bsx=b.x-cam.x;if(bsx<-22||bsx>W+22)continue;
      // 어두운 outline
      cx.fillStyle='#1a0033';cx.beginPath();cx.arc(bsx,b.y,11,0,Math.PI*2);cx.fill();
      // 본체 — 흰 중심 + 채도 높은 컬러
      const hue2=(gt*3+b.x*0.2)%360;
      const bg=cx.createRadialGradient(bsx,b.y,1,bsx,b.y,9);
      bg.addColorStop(0,'#fff');bg.addColorStop(0.45,`hsla(${hue2},100%,68%,1)`);bg.addColorStop(1,`hsla(${hue2},100%,48%,1)`);
      cx.fillStyle=bg;cx.beginPath();cx.arc(bsx,b.y,9,0,Math.PI*2);cx.fill();
      cx.fillStyle='#fff';cx.font='bold 11px sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('★',bsx,b.y);
    }
  }

  // ── Stage 14: Water geysers draw
  if(n===14&&mech.geysers){
    const GW=28;
    for(const g of mech.geysers){
      const gsx=g.x-cam.x;
      if(gsx<-80||gsx>W+80)continue;
      if(g.phase==='warning'){
        const pulse=0.4+Math.sin(gt*0.35)*0.5;
        cx.fillStyle=`rgba(80,190,255,${0.3+pulse*0.3})`;
        cx.beginPath();cx.ellipse(gsx,GY-3,GW*0.75,7,0,0,Math.PI*2);cx.fill();
        for(let i=0;i<3;i++){
          const alf=(0.35+i*0.15)*(0.5+pulse*0.5);
          cx.fillStyle=`rgba(80,190,255,${alf})`;
          cx.beginPath();cx.moveTo(gsx-7,GY-13-i*11);cx.lineTo(gsx+7,GY-13-i*11);cx.lineTo(gsx,GY-22-i*11);cx.fill();
        }
      } else if((g.phase==='active'||g.phase==='retreat')&&g.h>0){
        const wg=cx.createLinearGradient(gsx-GW/2,GY-g.h,gsx+GW/2,GY-g.h);
        wg.addColorStop(0,'rgba(0,150,255,0.82)');wg.addColorStop(0.5,'rgba(100,220,255,0.95)');wg.addColorStop(1,'rgba(0,150,255,0.82)');
        cx.fillStyle=wg;
        cx.beginPath();cx.roundRect(gsx-GW/2,GY-g.h,GW,g.h,GW*0.4);cx.fill();
        fillC(gsx,GY-g.h,GW*0.6,'rgba(180,240,255,0.88)');
        if(g.phase==='active'){
          for(let i=0;i<5;i++){
            const da=gt*0.28+i*(Math.PI*2/5);
            const dr=14+i*4;
            fillC(gsx+Math.cos(da)*dr,GY-g.h-10-i*5,2.5,'rgba(150,220,255,0.85)');
          }
        }
      }
    }
  }

  // ── Stage 15: Moving platforms draw
  if(n===15&&mech.movPlats){
    const CIRCUS_C=['#e63946','#f7b731','#7b2d8b','#2a9d8f'];
    for(const p of mech.movPlats){
      const psx=p.x-cam.x;
      if(psx+p.w<-10||psx>W+10)continue;
      const ci=Math.floor(p.x/300)%CIRCUS_C.length;
      const c1=CIRCUS_C[ci],c2=CIRCUS_C[(ci+1)%CIRCUS_C.length];
      cx.fillStyle=c1;cx.fillRect(psx,p.y,p.w,PLAT_H);
      cx.fillStyle=c2;
      for(let i=0;i<p.w;i+=20)cx.fillRect(psx+i,p.y,10,PLAT_H);
      cx.fillStyle='rgba(255,255,255,0.35)';cx.fillRect(psx,p.y,p.w,3);
      cx.fillStyle='rgba(0,0,0,0.2)';cx.fillRect(psx,p.y+PLAT_H-2,p.w,2);
      cx.strokeStyle='rgba(180,100,0,0.4)';cx.lineWidth=1.5;cx.setLineDash([3,5]);
      cx.beginPath();cx.moveTo(psx+p.w/2,p.y);cx.lineTo(psx+p.w/2,0);cx.stroke();
      cx.setLineDash([]);
    }
  }

  if(n===10&&mech.key){
    if(!mech.key.collected){
      const sx=mech.key.x-cam.x;
      if(sx>-30&&sx<W+30){
        const bob=Math.sin(gt*0.1)*5;
        cx.save();cx.translate(sx,mech.key.y+bob);
        cx.shadowColor='rgba(255,220,0,0.8)';cx.shadowBlur=10;
        cx.strokeStyle='#ffd600';cx.lineWidth=4;cx.lineCap='round';
        cx.beginPath();cx.arc(0,-10,9,0,Math.PI*2);cx.stroke();
        cx.beginPath();cx.moveTo(0,0);cx.lineTo(0,20);cx.stroke();
        cx.beginPath();cx.moveTo(0,12);cx.lineTo(7,12);cx.stroke();
        cx.beginPath();cx.moveTo(0,19);cx.lineTo(7,19);cx.stroke();
        cx.restore();
      }
    }
    // Door
    if(!mech.doorOpen){
      const dx=sd.flag-44-cam.x;
      if(dx>-40&&dx<W+40){
        const dfl=mech.doorFlash>0&&Math.floor(mech.doorFlash/4)%2===0;
        const dGrd=cx.createLinearGradient(dx,GY-130,dx+32,GY-130);
        dGrd.addColorStop(0,'#5d3a1a');dGrd.addColorStop(0.5,'#8b5a2b');dGrd.addColorStop(1,'#4a2c0a');
        cx.fillStyle=dfl?'rgba(255,100,0,0.9)':dGrd;cx.fillRect(dx,GY-130,32,130);
        cx.strokeStyle=dfl?'#ff5722':'#c8860a';cx.lineWidth=2.5;cx.strokeRect(dx+1,GY-129,30,128);
        // Door planks
        if(!dfl){
          cx.strokeStyle='rgba(0,0,0,0.25)';cx.lineWidth=1;
          for(let y=GY-110;y<GY;y+=20){cx.beginPath();cx.moveTo(dx+2,y);cx.lineTo(dx+30,y);cx.stroke();}
        }
        // Lock
        cx.font='18px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
        cx.fillText('🔒',dx+16,GY-65);
      }
    } else if(mech.doorFlash>0){
      const dx=sd.flag-44-cam.x;
      cx.globalAlpha=mech.doorFlash/80;
      for(let i=0;i<10;i++){
        const a=gt*0.18+i*(Math.PI*2/10);
        fillC(dx+16+Math.cos(a)*28,GY-65+Math.sin(a)*35,5+i%3*2,'#ffd600');
      }
      cx.globalAlpha=1;
    }
  }
}

// ── Cat character (fallback)

function drawPlayer(){
  const sx=player.x-cam.x;
  const sy=player.y;
  if(player.dead){
    cx.save();cx.translate(sx+PW/2,sy+PH/2);cx.rotate(player.deadRot);
    drawSprite(-PW/2,-PH/2,player.facing,0,true,true);
    cx.restore();return;
  }
  const walkOsc=player.onGround&&Math.abs(player.vx)>0.5?Math.sin(gt*0.28)*4:0;
  drawSprite(sx,sy,player.facing,walkOsc,!player.onGround,false);
}

// ── Enemies
function drawEnemies(){
  enemies.forEach(e=>{
    if(e.dead){
      if(e.deadTimer>0){
        const sx=e.x-cam.x,sy=e.y+e.h/2;
        cx.globalAlpha=e.deadTimer/35;
        txtS('+200',sx+e.w/2,sy-32,14,'#ffeb3b','#e65100');
        cx.globalAlpha=1;
      }
      return;
    }
    const sx=e.x-cam.x;if(sx+e.w<-30||sx>W+30)return;
    const bob=Math.sin(gt*0.14+e.x*0.03)*2;
    const sy=e.y+bob,facing=e.vx>0?1:-1;
    const sp=SPRITES[e.sprite];
    if(sp){
      const dispH=e.h*1.85,dispW=dispH*sp.width/sp.height;
      const cx0=sx+e.w/2,cy0=sy+e.h+4-dispH;
      const baseFace=SPRITE_BASE_FACING[e.sprite]||1;
      const useImg=(facing!==baseFace)?(getFlippedSprite(e.sprite)||sp):sp;
      cx.drawImage(useImg,cx0-dispW/2,cy0,dispW,dispH);
    } else {
      cx.fillStyle='rgba(0,0,0,0.22)';cx.beginPath();cx.ellipse(sx+e.w/2,e.groundY+e.h+6,e.w*0.42,5,0,0,Math.PI*2);cx.fill();
      if(e.sprite==='turtle')drawAnimalTurtle(sx,sy,e.w,e.h,facing);
      else if(e.sprite==='chick')drawAnimalChick(sx,sy,e.w,e.h,facing);
      else drawAnimalBunny(sx,sy,e.w,e.h,facing);
    }
    drawHeldCard(sx,sy,e.w,e.h,facing,e.word);
  });
}

// ── Card flight (enemy → player) + pop particles
function spawnCardFlight(e){
  cardFlights.push({word:e.word,startX:e.x+e.w/2,startY:e.y+e.h*0.55,timer:0,maxTimer:32});
}
function spawnPopFX(e){
  for(let i=0;i<8;i++){
    const a=Math.random()*Math.PI*2,sp=2+Math.random()*3;
    popParticles.push({x:e.x+e.w/2,y:e.y+e.h*0.5,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,life:28,max:28,color:i%3===0?'#ffd600':i%3===1?'#ff8a65':'#80d8ff'});
  }
}
function updateCardFlights(){
  for(let i=cardFlights.length-1;i>=0;i--){
    const c=cardFlights[i];c.timer++;
    if(c.timer>=c.maxTimer){
      playerCard={word:c.word,timer:90,max:90};
      if(window.speechSynthesis&&!window.speechSynthesis.speaking&&!window.speechSynthesis.pending){
        const u=new SpeechSynthesisUtterance(c.word);u.lang='ko-KR';u.rate=0.8;u.pitch=1.15;u.volume=1;
        window.speechSynthesis.speak(u);
      }
      cardFlights.splice(i,1);
    }
  }
  if(playerCard){playerCard.timer--;if(playerCard.timer<=0)playerCard=null;}
}
function updatePopParticles(){
  for(let i=popParticles.length-1;i>=0;i--){
    const p=popParticles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.vx*=0.96;p.life--;
    if(p.life<=0)popParticles.splice(i,1);
  }
}
function drawCardFlights(){
  for(const c of cardFlights){
    const t=c.timer/c.maxTimer;
    const x0=c.startX,y0=c.startY;
    const x1=player.x+player.w/2,y1=player.y-22;
    const mx=(x0+x1)/2,my=Math.min(y0,y1)-70;
    const u=1-t;
    const px=u*u*x0+2*u*t*mx+t*t*x1;
    const py=u*u*y0+2*u*t*my+t*t*y1;
    const rot=Math.sin(t*Math.PI*3)*0.35;
    const scale=0.75+t*0.35;
    drawFloatingCard(px-cam.x,py,c.word,rot,scale,false);
  }
}
function drawPlayerCard(){
  if(!playerCard)return;
  const sx=player.x-cam.x+player.w/2;
  const sy=player.y-28;
  const ageT=(playerCard.max-playerCard.timer)/playerCard.max;
  const pulse=1+Math.sin(ageT*Math.PI*5)*0.06*Math.max(0,1-ageT*1.8);
  const fadeAlpha=playerCard.timer<20?playerCard.timer/20:1;
  cx.globalAlpha=fadeAlpha;
  drawFloatingCard(sx,sy,playerCard.word,0,pulse,true);
  cx.globalAlpha=1;
}
function drawFloatingCard(cx0,cy0,word,rot,scale,atPlayer){
  const img=getCardImg(word,atPlayer?'#ffd600':'#ef5350');
  cx.save();cx.translate(cx0,cy0);cx.rotate(rot);
  if(scale!==1)cx.scale(scale,scale);
  cx.drawImage(img,-img.width/2,-img.height/2);
  cx.restore();
}
function drawPopParticles(){
  for(const p of popParticles){
    const a=p.life/p.max;cx.globalAlpha=a;
    cx.fillStyle=p.color;
    cx.beginPath();cx.arc(p.x-cam.x,p.y,3,0,Math.PI*2);cx.fill();
  }
  cx.globalAlpha=1;
}
