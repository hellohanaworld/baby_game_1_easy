// ── Audio ─────────────────────────────────────────────────────────────────────
let AC=null;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function tone(freq,dur,type,vol,freqEnd){
  try{
    const a=getAC(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type=type||'square';
    o.frequency.setValueAtTime(freq,a.currentTime);
    if(freqEnd)o.frequency.linearRampToValueAtTime(freqEnd,a.currentTime+dur);
    g.gain.setValueAtTime(vol||0.3,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
    o.start();o.stop(a.currentTime+dur+0.02);
  }catch(e){}
}
function sfxJump(){  // 뿅!
  tone(280,0.04,'square',0.35);
  setTimeout(()=>tone(480,0.04,'square',0.32),40);
  setTimeout(()=>tone(780,0.12,'square',0.38),85);
}

}

});

function jp(code){const v=!!JP[code];delete JP[code];return v;}

// ── Game state ────────────────────────────────────────────────────────────────
let state='title'; // title|playing|stageclear|gameover|win
let stageNum=1,lives=3,score=0,hiScore=0;
let player,enemies,coins,sd; // sd = current stage data
let cam={x:0};
let timer=0; // state transition timer
let gt=0;    // global tick
let clouds=[{x:80,y:55,r:38},{x:310,y:75,r:45},{x:580,y:45,r:32},{x:800,y:68,r:40}];

// ── Physics helpers ───────────────────────────────────────────────────────────
function overlaps(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}
function getSolids(){
  const s=sd.plats.map(([x,y,w])=>({x,y,w,h:PLAT_H}));
  s.push({x:-9999,y:GY,w:99999,h:200}); // ground
  return s;
}
function moveEntity(e,solids){
  e.onGround=false;
  // X
  e.x+=e.vx;
  if(e.x<0){e.x=0;e.vx=0;}
  if(e.x+e.w>sd.w){e.x=sd.w-e.w;e.vx=0;}
  for(const s of solids){
    if(!overlaps(e.x,e.y,e.w,e.h,s.x,s.y,s.w,s.h))continue;
    const ox=Math.min(e.x+e.w,s.x+s.w)-Math.max(e.x,s.x);
    if(e.x+e.w/2<s.x+s.w/2)e.x-=ox; else e.x+=ox;
    e.vx=0;
  }
  // Y
  e.y+=e.vy;
  for(const s of solids){
    if(!overlaps(e.x,e.y,e.w,e.h,s.x,s.y,s.w,s.h))continue;
    const oy=Math.min(e.y+e.h,s.y+s.h)-Math.max(e.y,s.y);
    if(e.y+e.h/2<s.y+s.h/2){e.y-=oy;e.vy=0;e.onGround=true;}
    else{e.y+=oy;if(e.vy<0)e.vy=0;}
  }
}

// ── Init stage ────────────────────────────────────────────────────────────────
function initStage(n){
  stageNum=n;
  sd=STAGES[n-1];
  player={x:80,y:GY-PH,vx:0,vy:0,w:PW,h:PH,onGround:false,facing:1,
          dead:false,deadTimer:0,deadVy:0,deadRot:0};
  const makeEnemy=(ex,wIdx,range,gy)=>({
    x:ex,y:(gy!==undefined?gy:GY)-EH,
    w:EW,h:EH,vx:1.3,
    word:WORDS[wIdx%WORDS.length],
    color:ECLR[wIdx%ECLR.length],
    patL:ex-range,patR:ex+range,
    dead:false,deadTimer:0,groundY:(gy!==undefined?gy:GY)-EH,
  });
  enemies=[
    ...sd.enems.map(([x,wi,r])=>makeEnemy(x,wi,r)),
    ...(sd.platEnems||[]).map(([x,gy,wi,r])=>makeEnemy(x,wi,r,gy)),
  ];
  coins=sd.coins.map(x=>({x,y:GY-85,w:20,h:20,collected:false}));
  cam.x=0;
}

// ── Kill player ───────────────────────────────────────────────────────────────
function killPlayer(){
  if(player.dead)return;
  player.dead=true;
  player.deadTimer=100;
  player.vy=-11;
  player.deadRot=0;
  sfxDie();
  lives--;
}

// ── Update: playing ───────────────────────────────────────────────────────────
function updatePlaying(){
  gt++;
  const solids=getSolids();

  if(!player.dead){
    // Input
    if(K.ArrowLeft){player.vx=-SPD;player.facing=-1;}
    else if(K.ArrowRight){player.vx=SPD;player.facing=1;}
    else player.vx*=0.72;

    if((jp('Space')||jp('ArrowUp'))&&player.onGround){
      player.vy=JVY;player.onGround=false;sfxJump();
    }
    // Gravity
    player.vy+=GRAV;if(player.vy>20)player.vy=20;
    moveEntity(player,solids);
    // Clamp left
    if(player.x<0)player.x=0;
    // Fall below stage
    if(player.y>H+120)killPlayer();
    // Camera
    const tgt=player.x-W*0.35;
    cam.x=Math.max(0,Math.min(tgt,sd.w-W));
  } else {
    // Death animation
    player.deadTimer--;
    player.vy+=GRAV;
    player.y+=player.vy;
    player.x+=player.vx*0.95;
    player.deadRot+=0.18;
    if(player.deadTimer<=0){
      if(lives<=0){if(score>hiScore)hiScore=score;state='gameover';timer=0;}
      else{initStage(stageNum);state='playing';}
    }
    return;
  }

  // Enemies
  for(const e of enemies){
    if(e.dead){e.deadTimer--;continue;}
    e.x+=e.vx;
    if(e.x<=e.patL||e.x+e.w>=e.patR)e.vx*=-1;
    e.y=e.groundY; // enemies stay on their ground, no gravity
  }

  // Coins
  for(const c of coins){
    if(c.collected)continue;
    if(overlaps(player.x,player.y,player.w,player.h,c.x,c.y,c.w,c.h)){
      c.collected=true;score+=100;sfxCoin();
    }
  }

  // Player-enemy collision
  for(const e of enemies){
    if(e.dead)continue;
    if(!overlaps(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h))continue;
    // Stomp check: player feet were above enemy top last frame, falling down
    const prevBottom=player.y+player.h-player.vy;
    if(player.vy>1&&prevBottom<=e.y+12){
      e.dead=true;e.deadTimer=35;
      player.vy=JVY*0.52;
      score+=200;sfxStomp();
    } else {
      killPlayer();
    }
  }

  // Flag
  if(player.x+player.w>sd.flag&&player.x<sd.flag+22){
    sfxClear();if(score>hiScore)hiScore=score;
    state='stageclear';timer=160;
  }

  // Clouds parallax
  clouds.forEach(c=>{c.x-=0.25;if(c.x+c.r*2<0)c.x=W+c.r;});
}

// ── Draw helpers ──────────────────────────────────────────────────────────────
function fillR(x,y,w,h,clr){cx.fillStyle=clr;cx.fillRect(x,y,w,h);}
function fillRR(x,y,w,h,r,clr){
  cx.fillStyle=clr;cx.beginPath();
  cx.roundRect(x,y,w,h,r);cx.fill();
}
function fillC(x,y,r,clr){cx.fillStyle=clr;cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();}
function txt(s,x,y,sz,clr,align='center'){
  cx.fillStyle=clr;cx.font=`bold ${sz}px "맑은 고딕",sans-serif`;
  cx.textAlign=align;cx.textBaseline='middle';cx.fillText(s,x,y);
}
function txtS(s,x,y,sz,clr,stk,align='center'){
  cx.font=`bold ${sz}px "맑은 고딕",sans-serif`;
  cx.textAlign=align;cx.textBaseline='middle';
  cx.strokeStyle=stk;cx.lineWidth=5;cx.lineJoin='round';cx.strokeText(s,x,y);
  cx.fillStyle=clr;cx.fillText(s,x,y);
}

// ── Draw: background ──────────────────────────────────────────────────────────
function drawBG(){
  const grad=cx.createLinearGradient(0,0,0,GY);
  grad.addColorStop(0,'#42a5f5');grad.addColorStop(1,'#b3e5fc');
  cx.fillStyle=grad;cx.fillRect(0,0,W,GY);
  // Clouds
  cx.fillStyle='rgba(255,255,255,0.88)';
  clouds.forEach(cl=>{
    const bob=Math.sin(gt*0.012+cl.x*0.05)*4;
    [0,-cl.r*0.55,cl.r*0.55,-cl.r*0.28,cl.r*0.28].forEach((ox,i)=>{
      const radii=[cl.r,cl.r*0.72,cl.r*0.72,cl.r*0.82,cl.r*0.82];
      fillC(cl.x+ox,cl.y+(i>0?cl.r*0.22:0)+bob,radii[i],'rgba(255,255,255,0.9)');
    });
  });
}

// ── Draw: ground ──────────────────────────────────────────────────────────────
function drawGround(){
  // Dirt
  fillR(0,GY,W,H-GY,'#795548');
  // Grass top
  fillR(0,GY,W,14,'#43a047');
  for(let x=cam.x%30;x<W;x+=30)fillR(x,GY-2,3,8,'#388e3c');
}

// ── Draw: platforms ───────────────────────────────────────────────────────────
function drawPlatforms(){
  sd.plats.forEach(([px,py,pw])=>{
    const sx=px-cam.x;
    if(sx+pw<0||sx>W)return;
    fillR(sx,py,pw,PLAT_H,'#8d6e63');
    fillR(sx,py,pw,5,'#a5d6a7');
    // Brick lines
    cx.strokeStyle='#6d4c41';cx.lineWidth=1;
    for(let i=0;i<pw;i+=38){cx.beginPath();cx.moveTo(sx+i,py);cx.lineTo(sx+i,py+PLAT_H);cx.stroke();}
    cx.beginPath();cx.moveTo(sx,py+PLAT_H/2);cx.lineTo(sx+pw,py+PLAT_H/2);cx.stroke();
  });
}

// ── Draw: coins ───────────────────────────────────────────────────────────────
function drawCoins(){
  coins.forEach(c=>{
    if(c.collected)return;
    const sx=c.x-cam.x;if(sx<-30||sx>W+30)return;
    const bob=Math.sin(gt*0.08+c.x*0.05)*3;
    fillC(sx+c.w/2,c.y+c.h/2+bob,10,'#ffd600');
    fillC(sx+c.w/2,c.y+c.h/2+bob,7,'#ffff00');
    txt('★',sx+c.w/2,c.y+c.h/2+bob,10,'#ff8f00');
  });
}

// ── Draw: flag ────────────────────────────────────────────────────────────────
function drawFlag(){
  const sx=sd.flag-cam.x;
  if(sx<-60||sx>W+60)return;
  // Pole
  fillR(sx+8,GY-220,6,220,'#bdbdbd');
  // Flag cloth
  const wave=Math.sin(gt*0.08)*4;
  cx.fillStyle='#e53935';cx.beginPath();
  cx.moveTo(sx+14,GY-220);cx.lineTo(sx+64+wave,GY-196);
  cx.lineTo(sx+14,GY-172);cx.closePath();cx.fill();
  txtS('골!',sx+39+wave/2,GY-196,13,'#fff','#c62828');
  // Base
  fillRR(sx-8,GY-6,38,20,4,'#9e9e9e');
}

// ── Draw: player ──────────────────────────────────────────────────────────────
function drawPlayer(){
  const sx=player.x-cam.x;
  const sy=player.y;
  if(player.dead){
    cx.save();
    cx.translate(sx+PW/2,sy+PH/2);
    cx.rotate(player.deadRot);
    drawPlayerBody(0,-PH/2,player.facing,false);
    cx.restore();
    return;
  }
  const walkOsc=player.onGround&&(Math.abs(player.vx)>0.5)?Math.sin(gt*0.28)*4:0;
  drawPlayerBody(sx,sy,player.facing,walkOsc);
}

function drawPlayerBody(x,y,facing,walkOsc){
  const f=facing;
  const skin='#f5c5a3', hair='#1c1c1c';
  const shirtC='#e53935', pantsC='#1565c0', shoeC='#4e342e';

  // 이동/점프 상태 감지
  const isMoving=Math.abs(walkOsc)>0.3;
  const isAir=player&&!player.onGround&&!player.dead;
  // 걷기 프레임: 7틱마다 0/1 교체
  const wf=isMoving?Math.floor(gt/7)%2:0;

  // ── 다리 오프셋 계산 ──
  // l=왼쪽다리, r=오른쪽다리  (x: 앞뒤 흔들림, y: 들리는 높이)
  let lx=0,rx=0,ly=0,ry=0;
  if(isAir){
    // 점프: 양발을 뒤로 접음
    lx=-3*f; rx=3*f; ly=3; ry=3;
  } else if(isMoving){
    // wf=0: 왼발 앞, 오른발 뒤 / wf=1: 반대
    lx=f*(wf===0?5:-5);  rx=f*(wf===0?-5:5);
    ly=wf===0?0:-3;      ry=wf===0?-3:0;
  }

  // ── 뒷팔 (몸통 뒤에 그림) ──
  const armSw=isMoving?(wf===0?-5:5)*f:0;
  fillRR(f>0?x-2:x+30, y+25+armSw, 8,12,3,skin);

  // ── 뒷다리 신발 ──
  if(f>0){
    fillRR(x+18+rx,y+44+ry,13,6,2,shoeC);
  } else {
    fillRR(x+5+lx, y+44+ly,13,6,2,shoeC);
  }

  // ── 뒷다리 ──
  if(f>0){
    fillRR(x+19+rx,y+34+ry,10,12,3,pantsC);
  } else {
    fillRR(x+6+lx, y+34+ly,10,12,3,pantsC);
  }

  // ── 반바지 허리 ──
  fillRR(x+3,y+32,30,6,3,pantsC);

  // ── 몸통 (티셔츠) ──
  fillRR(x+3,y+20,30,14,5,shirtC);
  fillR(x+3,y+26,30,2,'rgba(255,255,255,0.35)');
  // 칼라
  fillRR(x+12,y+20,12,5,3,'#ffecec');

  // ── 앞다리 신발 ──
  if(f>0){
    fillRR(x+5+lx, y+44+ly,13,6,2,shoeC);
  } else {
    fillRR(x+18+rx,y+44+ry,13,6,2,shoeC);
  }

  // ── 앞다리 ──
  if(f>0){
    fillRR(x+6+lx, y+34+ly,10,12,3,pantsC);
  } else {
    fillRR(x+19+rx,y+34+ry,10,12,3,pantsC);
  }

  // ── 앞팔 ──
  fillRR(f>0?x+30:x-2, y+25-armSw, 8,12,3,skin);

  // ── 목 ──
  fillRR(x+14,y+17,8,5,2,skin);

  // ── 얼굴 (치비: 큰 머리) ──
  fillRR(x+3,y+1,30,19,9,skin);
  fillC(x+18,y+18,8,skin); // 턱

  // ── 머리카락 (짧은 단발, 한국 남자아이) ──
  // 뒤통수
  cx.fillStyle=hair;cx.beginPath();cx.roundRect(x+2,y+0,32,11,9);cx.fill();
  // 옆머리
  fillRR(x+2,y+0,8,18,4,hair);
  fillRR(x+26,y+0,8,18,4,hair);
  // 앞머리 (한쪽으로 살짝 넘긴 스타일)
  const bgX=f>0?x+9:x+8;
  fillRR(bgX,y+8,17,8,4,hair);
  // 삐죽 튀어나온 앞머리
  fillRR(f>0?x+23:x+6,y+5,6,6,3,hair);

  // ── 귀 ──
  fillC(f>0?x+4:x+32,y+14,4,skin);

  // ── 눈 (FF6 치비: 가로로 납작한 아시아형) ──
  const ex=f>0?x+19:x+9;
  const ey=y+11;
  // 눈 흰자 (작은 가로 직사각형)
  fillRR(ex,ey,8,5,1,'#fff8f0');
  // 홍채 (진한 갈색)
  fillRR(ex+1,ey+1,6,4,'#3e2008');
  // 눈동자
  fillRR(ex+2,ey+1,3,3,'#111');
  // 하이라이트
  fillR(ex+2,ey+1,1,1,'rgba(255,255,255,0.85)');
  // 위 눈꺼풀 선 (쌍꺼풀 없는 일자눈)
  cx.strokeStyle='#5d3a1a';cx.lineWidth=1.5;cx.lineCap='round';
  cx.beginPath();cx.moveTo(ex,ey+0.5);cx.lineTo(ex+8,ey+0.5);cx.stroke();
  // 속눈썹 (위쪽에 짧게)
  cx.lineWidth=1;
  [0,2,4,6].forEach(i=>{cx.beginPath();cx.moveTo(ex+i,ey);cx.lineTo(ex+i,ey-2);cx.stroke();});
  // 눈썹 (진하고 약간 각진)
  fillRR(ex-1,ey-5,10,2,1,hair);

  // ── 코 (작게) ──
  cx.fillStyle='rgba(200,120,90,0.45)';
  cx.beginPath();cx.ellipse(x+18+f*2,y+16,2,1.3,0,0,Math.PI*2);cx.fill();

  // ── 입 (작은 미소) ──
  cx.strokeStyle='#c07070';cx.lineWidth=1.5;cx.lineCap='round';
  cx.beginPath();
  cx.moveTo(x+14+f,y+20);
  cx.quadraticCurveTo(x+18+f,y+22,x+22+f,y+20);
  cx.stroke();

  // ── 볼 홍조 (은은하게) ──
  cx.fillStyle='rgba(255,140,120,0.22)';
  cx.beginPath();cx.ellipse(x+7,y+16,4.5,2.5,0,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(x+29,y+16,4.5,2.5,0,0,Math.PI*2);cx.fill();
}

// ── Draw: enemies ─────────────────────────────────────────────────────────────
function drawEnemies(){
  enemies.forEach(e=>{
    if(e.dead){
      if(e.deadTimer>0){
        const sx=e.x-cam.x;
        const sy=e.y+e.h/2;
        const a=e.deadTimer/35;
        fillRR(sx,sy-4,e.w,8,4,e.color);
        txt('✕',sx+e.w/2,sy,18,'#fff');
        cx.globalAlpha=a;
        txtS('+200',sx+e.w/2,sy-30,14,'#ffeb3b','#e65100');
        cx.globalAlpha=1;
      }
      return;
    }
    const sx=e.x-cam.x;
    if(sx+e.w<-20||sx>W+20)return;
    const bob=Math.sin(gt*0.14+e.x*0.03)*2;
    const sy=e.y+bob;
    const facing=e.vx>0?1:-1;
    // Body
    fillRR(sx,sy,e.w,e.h,8,e.color);
    // Shine
    cx.fillStyle='rgba(255,255,255,0.25)';cx.beginPath();
    cx.ellipse(sx+e.w*0.35,sy+e.h*0.25,e.w*0.22,e.h*0.15,0,0,Math.PI*2);cx.fill();
    // Eyes
    const eyeX=facing>0?sx+e.w*0.65:sx+e.w*0.35;
    fillC(eyeX,sy+14,5,'#fff');
    fillC(eyeX+facing*2,sy+14,3,'#1a1a1a');
    // Angry brow
    cx.strokeStyle='#1a1a1a';cx.lineWidth=2.5;cx.lineCap='round';
    cx.beginPath();cx.moveTo(eyeX-5,sy+8);cx.lineTo(eyeX+5,sy+10);cx.stroke();
    // Feet
    fillRR(sx+5,sy+e.h-6,15,8,4,'rgba(0,0,0,0.35)');
    fillRR(sx+e.w-20,sy+e.h-6,15,8,4,'rgba(0,0,0,0.35)');
    // Korean word — white text with dark stroke
    cx.font=`bold 16px "맑은 고딕",sans-serif`;
    cx.textAlign='center';cx.textBaseline='middle';
    cx.strokeStyle='rgba(0,0,0,0.6)';cx.lineWidth=3;cx.strokeText(e.word,sx+e.w/2,sy+e.h/2+2);
    cx.fillStyle='#fff';cx.fillText(e.word,sx+e.w/2,sy+e.h/2+2);
  });
}

// ── Draw: HUD ─────────────────────────────────────────────────────────────────
function drawHUD(){
  // Panel
  cx.fillStyle='rgba(0,0,0,0.45)';cx.fillRect(0,0,W,38);
  // Lives
  for(let i=0;i<lives;i++){
    txt('♥',22+i*28,19,20,'#ef5350');
  }
  // Score
  txtS(`점수: ${score}`,W/2,19,16,'#fff','#1a1a1a');
  // Stage
  txtS(`스테이지 ${stageNum}/10`,W-90,19,15,'#fff8e1','#1a1a1a');
  // Hi-score
  if(hiScore>0)txt(`최고: ${hiScore}`,W-90,28,11,'#ffd600');
}

// ── Screens ───────────────────────────────────────────────────────────────────
function drawTitle(){
  // Sky BG
  const grad=cx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#1565c0');grad.addColorStop(1,'#42a5f5');
  cx.fillStyle=grad;cx.fillRect(0,0,W,H);
  // Stars
  for(let i=0;i<30;i++){
    const sx=(i*137+50)%W,sy=(i*97+30)%(H*0.5);
    const r=0.8+Math.sin(gt*0.06+i)*0.5;
    fillC(sx,sy,r,'#fff');
  }
  // Ground strip
  fillR(0,H-70,W,70,'#43a047');fillR(0,H-70,W,8,'#2e7d32');
  // Title box
  cx.fillStyle='rgba(0,0,0,0.5)';
  fillRR(W/2-220,80,440,160,18,'rgba(0,0,0,0.55)');
  const pulse=1+Math.sin(gt*0.07)*0.04;
  cx.save();cx.translate(W/2,145);cx.scale(pulse,pulse);
  txtS('지율이의 한글나라',0,0,52,'#ffeb3b','#e65100');
  cx.restore();
  txtS('🌟 한글 단어 탐험 🌟',W/2,185,18,'#fff','#1565c0');
  // Controls
  fillRR(W/2-210,270,420,110,14,'rgba(255,255,255,0.12)');
  txt('조작 방법',W/2,292,16,'#ffd600');
  txt('← → 화살표: 이동    ↑ / 스페이스: 점프',W/2,316,15,'#fff');
  txt('적 위에서 점프 → 적 제거!   깃발에 닿으면 클리어!',W/2,338,14,'#b3e5fc');
  txt('장애물 옆에 부딪히면 목숨 감소 (♥ 3개)',W/2,360,13,'rgba(255,180,180,0.9)');
  // Start
  const blink=Math.floor(gt/22)%2===0;
  if(blink)txtS('스페이스 키를 눌러 시작!',W/2,418,22,'#fff','#1565c0');
  // Demo player
  cx.save();cx.translate(W/2-250,H-120);
  drawPlayerBody(0,0,1,Math.sin(gt*0.25)*5);
  cx.restore();
}

function drawStageClear(){
  drawBG();drawGround();drawPlatforms();drawCoins();drawFlag();drawEnemies();drawPlayer();drawHUD();
  cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(0,0,W,H);
  const pulse=1+Math.sin(gt*0.15)*0.06;
  cx.save();cx.translate(W/2,H/2-40);cx.scale(pulse,pulse);
  txtS('스테이지 클리어!',0,0,48,'#ffeb3b','#e65100');
  cx.restore();
  txtS(`🌟 +스테이지 보너스! 🌟`,W/2,H/2+20,22,'#fff','#1a1a1a');
  if(stageNum<10)txtS(`다음 스테이지: ${stageNum+1}/10`,W/2,H/2+58,20,'#b3e5fc','#1a1a1a');
  else txtS('마지막 스테이지 완료!',W/2,H/2+58,20,'#b3e5fc','#1a1a1a');
}

function drawGameOver(){
  cx.fillStyle='#1a1a1a';cx.fillRect(0,0,W,H);
  for(let i=0;i<20;i++){
    const sx=(i*173)%W,sy=(i*113)%H;
    cx.fillStyle=`rgba(255,0,0,${0.05+Math.sin(gt*0.03+i)*0.03})`;
    cx.fillRect(sx,sy,80,60);
  }
  txtS('게임 오버',W/2,H/2-80,58,'#ef5350','#b71c1c');
  txt(`최종 점수: ${score}`,W/2,H/2-10,24,'#fff');
  if(hiScore>0)txt(`최고 점수: ${hiScore}`,W/2,H/2+28,18,'#ffd600');
  txt(`스테이지 ${stageNum}까지 도달!`,W/2,H/2+62,17,'#b3e5fc');
  const blink=Math.floor(gt/22)%2===0;
  if(blink)txtS('스페이스 키로 다시 시작',W/2,H/2+110,20,'#fff','#b71c1c');
}

function drawWin(){
  const grad=cx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,'#f57f17');grad.addColorStop(0.5,'#fbc02d');grad.addColorStop(1,'#ff8f00');
  cx.fillStyle=grad;cx.fillRect(0,0,W,H);
  // Confetti
  for(let i=0;i<50;i++){
    const x=(i*137+gt*2)%W;
    const y=(i*97+gt*(0.5+i%3*0.3))%H;
    const clr=['#e53935','#42a5f5','#66bb6a','#ab47bc','#fff'][i%5];
    fillRR(x,y,8,8,2,clr);
  }
  const pulse=1+Math.sin(gt*0.1)*0.07;
  cx.save();cx.translate(W/2,H/2-70);cx.scale(pulse,pulse);
  txtS('🎉 게임 클리어! 🎉',0,0,50,'#fff','#e65100');
  cx.restore();
  txtS('10개 스테이지 완주!',W/2,H/2-5,28,'#1a237e','rgba(255,255,255,0.5)');
  txt(`최종 점수: ${score}`,W/2,H/2+40,22,'#1a237e');
  if(hiScore>0)txt(`최고 점수: ${hiScore}`,W/2,H/2+72,18,'#4a148c');
  txtS('모험가 최고!',W/2,H/2+110,28,'#fff','#e65100');
  const blink=Math.floor(gt/22)%2===0;
  if(blink)txtS('스페이스 키로 처음부터',W/2,H/2+150,18,'#fff','#e65100');
}

// ── Main loop ─────────────────────────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  gt++;

  cx.clearRect(0,0,W,H);

  switch(state){
    case 'title':
      drawTitle();
      if(jp('Space')||jp('ArrowUp')){
        stageNum=1;lives=3;score=0;
        initStage(1);state='playing';sfxTitle();
      }
      break;

    case 'playing':
      updatePlaying();
      drawBG();drawGround();drawPlatforms();drawCoins();drawFlag();drawEnemies();drawPlayer();drawHUD();
      break;

    case 'stageclear':
      drawStageClear();
      timer--;
      if(timer<=0){
        score+=stageNum*500; // stage bonus
        if(stageNum>=10){state='win';timer=0;}
        else{initStage(stageNum+1);state='playing';}
      }
      break;

    case 'gameover':
      drawGameOver();
      timer++;
      if(timer>90&&(jp('Space')||jp('ArrowUp'))){
        stageNum=1;lives=3;score=0;
        initStage(1);state='playing';sfxTitle();
      }
      break;

    case 'win':
      drawWin();
      if(jp('Space')||jp('ArrowUp')){
        stageNum=1;lives=3;score=0;
        initStage(1);state='playing';sfxTitle();
      }
      break;
  }

  // Clear just-pressed (except current frame)
  // (handled by jp() consuming entries on read)
}

loop();
</script>
