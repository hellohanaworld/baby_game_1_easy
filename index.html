// ── Audio
let AC=null;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function tone(freq,dur,type,vol,freqEnd){
  try{
    const a=getAC(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type=type||'square';
    o.frequency.setValueAtTime(freq,a.currentTime);
    if(freqEnd)o.frequency.linearRampToValueAtTime(freqEnd,a.currentTime+dur);
    g.gain.setValueAtTime(vol||0.3,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
    o.start();o.stop(a.currentTime+dur+0.02);
  }catch(e){}
}
function sfxJump(){tone(280,0.04,'square',0.35);setTimeout(()=>tone(480,0.04,'square',0.32),40);setTimeout(()=>tone(780,0.12,'square',0.38),85);}
function sfxDie(){tone(420,0.07,'sawtooth',0.5);setTimeout(()=>tone(320,0.09,'sawtooth',0.45),70);setTimeout(()=>tone(220,0.12,'sawtooth',0.38),155);setTimeout(()=>tone(140,0.22,'sawtooth',0.28),265);}

function sfxCoin(){tone(880,0.04,'sine',0.28);setTimeout(()=>tone(1320,0.14,'sine',0.22),45);}

// ── Sprite sheet (지율이.png  3×3 grid)
const sprImg=new Image();
let sprReady=false;
sprImg.onload=()=>{sprReady=true;};
sprImg.src='지율이.png';
// [col, row] in 3×3 grid
// Row0: run-stride-A, run-stride-B, fall/surprised
// Row1: run-stride-C, jump-excited,  run-upright
// Row2: crouch-mushroom, crouch-read, [game objects]
const SPF={walk1:[0,0],walk2:[0,1],jump:[1,1],idle:[2,1],dead:[2,0]};

function drawSprite(ox,oy,facing,walkOsc,inAir,isDead){
  if(!sprReady){drawCat(ox,oy,facing,walkOsc,inAir);return;}
  const sw=sprImg.naturalWidth/3,sh=sprImg.naturalHeight/3;
  let f;
  if(isDead)f=SPF.dead;
  else if(inAir)f=SPF.jump;
  else if(Math.abs(walkOsc)>0.3)f=(Math.floor(gt/7)%2===0)?SPF.walk1:SPF.walk2;
  else f=SPF.idle;
  const[sc,sr]=f;
  const dh=PH*2.6,dw=dh;
  const dx=ox+PW/2-dw/2,dy=oy+PH-dh+dh*0.05;
  cx.save();
  if(facing<0){cx.translate(dx+dw/2,0);cx.scale(-1,1);cx.translate(-(dx+dw/2),0);}
  cx.drawImage(sprImg,sc*sw,sr*sh,sw,sh,dx,dy,dw,dh);
  cx.restore();
}

// ── Keyboard input
const K={},JP={};
addEventListener('keydown',e=>{
  if(!K[e.code])JP[e.code]=true;
  K[e.code]=true;
  if(['Space','ArrowUp','ArrowLeft','ArrowRight','ArrowDown'].includes(e.code))e.preventDefault();
  getAC();
});

function jp(code){const v=!!JP[code];delete JP[code];return v;}

// ── Mobile touch controls
const TOUCH={left:false,right:false,jump:false};
let _jpJump=false,_anyTap=false;
const BTN={
  left: {x:24, y:H-105, w:85, h:75},
  right:{x:120,y:H-105, w:85, h:75},
  jump: {x:W-135,y:H-115,w:110,h:85}
};
function getTouchBtn(tx,ty){
  const rect=cv.getBoundingClientRect();
  const cx2=(tx-rect.left)*(W/rect.width);
  const cy2=(ty-rect.top)*(H/rect.height);
  if(cy2>BTN.left.y&&cy2<BTN.left.y+BTN.left.h&&cx2>BTN.left.x&&cx2<BTN.left.x+BTN.left.w)return'left';
  if(cy2>BTN.right.y&&cy2<BTN.right.y+BTN.right.h&&cx2>BTN.right.x&&cx2<BTN.right.x+BTN.right.w)return'right';
  if(cy2>BTN.jump.y&&cy2<BTN.jump.y+BTN.jump.h&&cx2>BTN.jump.x&&cx2<BTN.jump.x+BTN.jump.w)return'jump';
  return null;
}
function updateTouchState(touches,active){
  const prevJump=TOUCH.jump;
  TOUCH.left=TOUCH.right=TOUCH.jump=false;
  if(active){
    for(let i=0;i<touches.length;i++){const b=getTouchBtn(touches[i].clientX,touches[i].clientY);if(b)TOUCH[b]=true;}
  }
  if(TOUCH.jump&&!prevJump)_jpJump=true;
}
cv.addEventListener('touchstart',e=>{e.preventDefault();getAC();_anyTap=true;updateTouchState(e.touches,true);},{passive:false});
cv.addEventListener('touchmove', e=>{e.preventDefault();updateTouchState(e.touches,true);},{passive:false});
cv.addEventListener('touchend',  e=>{e.preventDefault();updateTouchState(e.touches,e.touches.length>0);},{passive:false});
cv.addEventListener('touchcancel',e=>{e.preventDefault();TOUCH.left=TOUCH.right=TOUCH.jump=false;},{passive:false});
function jpTouch(){const v=_jpJump;_jpJump=false;return v;}
function jpTap(){const v=_anyTap;_anyTap=false;return v;}

// ── Physics
function overlaps(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}
function getSolids(){
  const s=sd.plats.map(([x,y,w])=>({x,y,w,h:PLAT_H}));
  s.push({x:-9999,y:GY,w:99999,h:200});
  return s;
}
function moveEntity(e,solids){
  e.onGround=false;
  e.x+=e.vx;
  if(e.x<0){e.x=0;e.vx=0;}
  if(e.x+e.w>sd.w){e.x=sd.w-e.w;e.vx=0;}
  for(const s of solids){
    if(!overlaps(e.x,e.y,e.w,e.h,s.x,s.y,s.w,s.h))continue;
    const ox=Math.min(e.x+e.w,s.x+s.w)-Math.max(e.x,s.x);
    if(e.x+e.w/2<s.x+s.w/2)e.x-=ox;else e.x+=ox;
    e.vx=0;
  }
  e.y+=e.vy;
  for(const s of solids){
    if(!overlaps(e.x,e.y,e.w,e.h,s.x,s.y,s.w,s.h))continue;
    const oy=Math.min(e.y+e.h,s.y+s.h)-Math.max(e.y,s.y);
    if(e.y+e.h/2<s.y+s.h/2){e.y-=oy;e.vy=0;e.onGround=true;}
    else{e.y+=oy;if(e.vy<0)e.vy=0;}
  }
}

// ── Init stage
function initStage(n){
  stageNum=n;sd=STAGES[n-1];th=THEMES[n-1];
  player={x:80,y:GY-PH,vx:0,vy:0,w:PW,h:PH,onGround:false,facing:1,dead:false,deadTimer:0,deadRot:0};
  const makeEnemy=(ex,wIdx,range,gy)=>({
    x:ex,y:(gy!==undefined?gy:GY)-EH,w:EW,h:EH,vx:1.3,
    word:WORDS[wIdx%WORDS.length],color:ECLR[wIdx%ECLR.length],
    patL:ex-range,patR:ex+range,dead:false,deadTimer:0,
    groundY:(gy!==undefined?gy:GY)-EH,
  });
  enemies=[
    ...sd.enems.map(([x,wi,r])=>makeEnemy(x,wi,r)),
    ...(sd.platEnems||[]).map(([x,gy,wi,r])=>makeEnemy(x,wi,r,gy)),
  ];
  coins=sd.coins.map(x=>({x,y:GY-85,w:20,h:20,collected:false}));
  cam.x=0;
}

function killPlayer(){
  if(player.dead)return;
  player.dead=true;player.deadTimer=100;player.vy=-11;player.deadRot=0;
  sfxDie();lives--;
}

// ── Update
function updatePlaying(){
  gt++;
  const solids=getSolids();
  if(!player.dead){
    const goLeft=K.ArrowLeft||TOUCH.left;
    const goRight=K.ArrowRight||TOUCH.right;
    const doJump=(jp('Space')||jp('ArrowUp')||jpTouch());
    if(goLeft){player.vx=-SPD;player.facing=-1;}
    else if(goRight){player.vx=SPD;player.facing=1;}
    else player.vx*=0.72;
    if(doJump&&player.onGround){player.vy=JVY;player.onGround=false;sfxJump();}
    player.vy+=GRAV;if(player.vy>20)player.vy=20;
    moveEntity(player,solids);
    if(player.x<0)player.x=0;
    if(player.y>H+120)killPlayer();
    cam.x=Math.max(0,Math.min(player.x-W*0.35,sd.w-W));
  } else {
    player.deadTimer--;
    player.vy+=GRAV;player.y+=player.vy;player.x+=player.vx*0.95;player.deadRot+=0.18;
    if(player.deadTimer<=0){
      if(lives<=0){if(score>hiScore)hiScore=score;state='gameover';timer=0;}
      else{initStage(stageNum);state='playing';}
    }
    return;
  }
  for(const e of enemies){
    if(e.dead){e.deadTimer--;continue;}
    e.x+=e.vx;
    if(e.x<=e.patL||e.x+e.w>=e.patR)e.vx*=-1;
    e.y=e.groundY;
  }
  for(const c of coins){
    if(c.collected)continue;
    if(overlaps(player.x,player.y,player.w,player.h,c.x,c.y,c.w,c.h)){c.collected=true;score+=100;sfxCoin();}
  }
  for(const e of enemies){
    if(e.dead)continue;
    if(!overlaps(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h))continue;
    const prevBottom=player.y+player.h-player.vy;
    if(player.vy>1&&prevBottom<=e.y+12){e.dead=true;e.deadTimer=35;player.vy=JVY*0.52;score+=200;sfxStomp();}
    else killPlayer();
  }
  if(player.x+player.w>sd.flag&&player.x<sd.flag+22){
    sfxClear();if(score>hiScore)hiScore=score;state='stageclear';timer=160;
  }
  clouds.forEach(c=>{c.x-=0.25;if(c.x+c.r*2<0)c.x=W+c.r;});
}

// ── Draw helpers
function fillR(x,y,w,h,clr){cx.fillStyle=clr;cx.fillRect(x,y,w,h);}
function fillRR(x,y,w,h,r,clr){cx.fillStyle=clr;cx.beginPath();cx.roundRect(x,y,w,h,r);cx.fill();}
function fillC(x,y,r,clr){cx.fillStyle=clr;cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();}
function txt(s,x,y,sz,clr,align='center'){cx.fillStyle=clr;cx.font=`bold ${sz}px "맑은 고딕",sans-serif`;cx.textAlign=align;cx.textBaseline='middle';cx.fillText(s,x,y);}
function txtS(s,x,y,sz,clr,stk,align='center'){cx.font=`bold ${sz}px "맑은 고딕",sans-serif`;cx.textAlign=align;cx.textBaseline='middle';cx.strokeStyle=stk;cx.lineWidth=5;cx.lineJoin='round';cx.strokeText(s,x,y);cx.fillStyle=clr;cx.fillText(s,x,y);}

// ── Background (theme-aware)
function drawBG(){
  const t=th;
  const grad=cx.createLinearGradient(0,0,0,GY);
  grad.addColorStop(0,t.skyT);grad.addColorStop(1,t.skyB);
  cx.fillStyle=grad;cx.fillRect(0,0,W,GY);

  // Decorations per theme
  if(t.decor==='star'){
    for(let i=0;i<50;i++){
      const sx=(i*137+50)%W,sy=(i*97+20)%(GY*0.85);
      const blink=0.5+Math.sin(gt*0.06+i)*0.5;
      fillC(sx,sy,1+i%2*0.5,`rgba(255,255,220,${blink})`);
    }
    // Moon
    fillC(W-80,60,34,'rgba(255,255,180,0.18)');
    fillC(W-80,60,28,'#fffde7');
    fillC(W-64,52,22,'#1a237e'); // shadow crescent
  }
  if(t.decor==='gold'){
    for(let i=0;i<30;i++){
      const sx=(i*173+50)%W,sy=(i*97+20)%(GY*0.7);
      const blink=0.4+Math.sin(gt*0.08+i)*0.4;
      fillC(sx,sy,1.5+i%3*0.5,`rgba(255,230,50,${blink})`);
    }
  }
  if(t.decor==='snow'){
    for(let i=0;i<25;i++){
      const sx=((i*173)+gt*(0.3+i%4*0.15))%W;
      const sy=((i*97)+gt*(0.6+i%3*0.2))%(GY-20);
      fillC(sx,sy,2+i%2,'rgba(255,255,255,0.75)');
    }
  }
  if(t.decor==='petal'){
    for(let i=0;i<18;i++){
      const sx=((i*173)+gt*(0.35+i%3*0.1))%W;
      const sy=((i*97)+gt*(0.55+i%4*0.15))%(GY-20);
      cx.save();cx.translate(sx,sy);cx.rotate(gt*0.015+i);
      cx.fillStyle=`rgba(255,160,190,0.65)`;
      cx.beginPath();cx.ellipse(0,0,6,3,0,0,Math.PI*2);cx.fill();
      cx.restore();
    }
  }
  if(t.decor==='bubble'){
    for(let i=0;i<10;i++){
      const bx=((i*173+cam.x*0.1)%W+W)%W;
      const by=GY-40-((i*60+gt*(0.4+i%3*0.2))%(GY-40));
      if(by<10)continue;
      cx.strokeStyle=`rgba(180,240,255,0.5)`;cx.lineWidth=1.5;
      cx.beginPath();cx.arc(bx,by,5+i%5*2,0,Math.PI*2);cx.stroke();
      fillC(bx-2,by-2,1.5,'rgba(255,255,255,0.4)');
    }
  }
  if(t.decor==='lava'){
    // Heat shimmer lines
    for(let i=0;i<6;i++){
      const lx=((i*160+gt*0.5)%(W+100))-50;
      cx.strokeStyle=`rgba(255,80,0,${0.15+Math.sin(gt*0.1+i)*0.08})`;
      cx.lineWidth=2;cx.beginPath();cx.moveTo(lx,GY-120);cx.lineTo(lx+30,GY-40);cx.stroke();
    }
  }
  if(t.decor==='candy'){
    for(let i=0;i<10;i++){
      const sx=((i*190+gt*0.3)%W);
      const sy=((i*110+30)%(GY*0.6));
      cx.strokeStyle=`rgba(255,255,255,${0.2+i%3*0.1})`;cx.lineWidth=3;
      cx.beginPath();cx.arc(sx,sy,12+i%4*4,0,Math.PI*1.5);cx.stroke();
    }
  }
  if(t.decor==='rainbow'){
    // Rainbow arc in background
    cx.save();cx.globalAlpha=0.3;
    const rw=500,rx=W/2,ry=GY+50;
    RAINBOW.forEach((clr,i)=>{
      cx.strokeStyle=clr;cx.lineWidth=18;
      cx.beginPath();cx.arc(rx,ry,rw-i*18,Math.PI,0);cx.stroke();
    });
    cx.restore();
  }

  // Clouds
  const cloudAlpha=t.decor==='star'?0.12:t.decor==='lava'?0.2:0.85;
  const cloudClr=t.decor==='star'?`rgba(200,210,255,${cloudAlpha})`:`rgba(255,255,255,${cloudAlpha})`;
  clouds.forEach(cl=>{
    const bob=Math.sin(gt*0.012+cl.x*0.05)*4;
    [0,-cl.r*0.55,cl.r*0.55,-cl.r*0.28,cl.r*0.28].forEach((ox2,i)=>{
      const radii=[cl.r,cl.r*0.72,cl.r*0.72,cl.r*0.82,cl.r*0.82];
      fillC(cl.x+ox2,cl.y+(i>0?cl.r*0.22:0)+bob,radii[i],cloudClr);
    });
  });
}

// ── Ground
function drawGround(){
  const t=th;
  fillR(0,GY,W,H-GY,t.groundC);
  fillR(0,GY,W,14,t.grassC);
  const grassDetail=t.decor==='snow'?'rgba(255,255,255,0.6)':t.decor==='cloud'?'rgba(200,230,255,0.5)':'rgba(0,0,0,0.15)';
  for(let x=cam.x%30;x<W;x+=30)fillR(x,GY-2,3,8,grassDetail);

  if(t.decor==='lava'){
    const glow=cx.createLinearGradient(0,GY,0,GY+12);
    glow.addColorStop(0,'rgba(255,80,0,0.7)');glow.addColorStop(1,'transparent');
    cx.fillStyle=glow;cx.fillRect(0,GY,W,12);
    // Cracks
    cx.strokeStyle='rgba(255,100,0,0.45)';cx.lineWidth=2;
    for(let i=0;i<6;i++){
      const lx=((i*210-cam.x*0.2)%W+W)%W;
      cx.beginPath();cx.moveTo(lx,GY);cx.lineTo(lx+12,GY+18);cx.lineTo(lx+3,GY+32);cx.stroke();
    }
  }
  if(t.decor==='snow'){
    // Snow bumps on ground
    for(let x=-20;x<W+20;x+=28){
      fillC(x,GY,10,'rgba(255,255,255,0.5)');
    }
  }
}

// ── Platforms
function drawPlatforms(){
  const t=th;
  sd.plats.forEach(([px,py,pw],idx)=>{
    const sx=px-cam.x;
    if(sx+pw<0||sx>W)return;

    if(t.decor==='mushroom'){
      // Mushroom cap style
      fillR(sx,py,pw,PLAT_H,t.platC);
      fillR(sx,py,pw,6,'#ef9a9a');
      [0.18,0.42,0.68,0.88].forEach(r=>{fillC(sx+pw*r,py+PLAT_H*0.55,4,'rgba(255,255,255,0.65)');});
      // Stem hint
      fillR(sx+pw*0.4,py+PLAT_H,pw*0.2,5,'#a5d6a7');
      return;
    }
    if(t.decor==='cloud'){
      // Fluffy cloud platform
      const numBumps=Math.max(3,Math.floor(pw/30));
      cx.fillStyle='rgba(245,251,255,0.95)';
      for(let i=0;i<numBumps;i++){
        const bx=sx+pw*((i+0.5)/numBumps);
        cx.beginPath();cx.arc(bx,py+6,PLAT_H*0.85,0,Math.PI*2);cx.fill();
      }
      fillR(sx,py+8,pw,PLAT_H-4,'rgba(245,251,255,0.95)');
      return;
    }
    if(t.decor==='lava'){
      fillR(sx,py,pw,PLAT_H,'#3e2723');
      fillR(sx,py,pw,3,'rgba(255,80,0,0.55)');
      cx.strokeStyle='#5d4037';cx.lineWidth=1;
      for(let i=0;i<pw;i+=36){cx.beginPath();cx.moveTo(sx+i,py);cx.lineTo(sx+i,py+PLAT_H);cx.stroke();}
      return;
    }
    if(t.decor==='candy'){
      // Candy stripe
      fillR(sx,py,pw,PLAT_H,t.platC);
      const stripeW=18;
      cx.fillStyle='rgba(255,255,255,0.35)';
      for(let i=0;i<pw;i+=stripeW*2){cx.fillRect(sx+i,py,stripeW,PLAT_H);}
      fillR(sx,py,pw,4,t.platTop);
      return;
    }
    if(t.decor==='star'){
      fillR(sx,py,pw,PLAT_H,t.platC);
      fillR(sx,py,pw,4,t.platTop);
      // Sparkle dots
      [0.2,0.5,0.8].forEach(r=>{fillC(sx+pw*r,py+PLAT_H/2,2,'rgba(255,230,50,0.7)');});
      return;
    }
    if(t.decor==='snow'){
      fillR(sx,py,pw,PLAT_H,'#80d8ff');
      fillR(sx,py,pw,5,'#ffffff');
      // Icicles
      for(let i=4;i<pw-4;i+=14){
        cx.fillStyle='rgba(180,230,255,0.8)';
        cx.beginPath();cx.moveTo(sx+i,py+PLAT_H);cx.lineTo(sx+i+5,py+PLAT_H);cx.lineTo(sx+i+2.5,py+PLAT_H+8);cx.fill();
      }
      return;
    }
    if(t.decor==='rainbow'){
      const clr=RAINBOW[idx%RAINBOW.length];
      fillR(sx,py,pw,PLAT_H,clr);
      fillR(sx,py,pw,5,'rgba(255,255,255,0.55)');
      return;
    }
    if(t.decor==='gold'){
      fillR(sx,py,pw,PLAT_H,t.platC);
      fillR(sx,py,pw,5,t.platTop);
      // Gold shine
      cx.fillStyle='rgba(255,255,255,0.25)';
      cx.beginPath();cx.ellipse(sx+pw*0.5,py+PLAT_H*0.4,pw*0.35,PLAT_H*0.25,0,0,Math.PI*2);cx.fill();
      cx.strokeStyle='rgba(180,130,0,0.4)';cx.lineWidth=1;
      for(let i=0;i<pw;i+=36){cx.beginPath();cx.moveTo(sx+i,py);cx.lineTo(sx+i,py+PLAT_H);cx.stroke();}
      return;
    }
    if(t.decor==='petal'){
      fillR(sx,py,pw,PLAT_H,t.platC);
      fillR(sx,py,pw,5,t.platTop);
      [0.15,0.35,0.55,0.75,0.9].forEach(r=>{
        cx.fillStyle='rgba(255,220,230,0.6)';
        cx.beginPath();cx.ellipse(sx+pw*r,py+3,4,3,0.3,0,Math.PI*2);cx.fill();
      });
      return;
    }
    if(t.decor==='bubble'){
      fillR(sx,py,pw,PLAT_H,t.platC);
      fillR(sx,py,pw,5,t.platTop);
      cx.fillStyle='rgba(150,240,255,0.2)';cx.fillRect(sx,py,pw,PLAT_H);
      return;
    }
    // default
    fillR(sx,py,pw,PLAT_H,t.platC);
    fillR(sx,py,pw,5,t.platTop);
    cx.strokeStyle='rgba(0,0,0,0.15)';cx.lineWidth=1;
    for(let i=0;i<pw;i+=38){cx.beginPath();cx.moveTo(sx+i,py);cx.lineTo(sx+i,py+PLAT_H);cx.stroke();}
    cx.beginPath();cx.moveTo(sx,py+PLAT_H/2);cx.lineTo(sx+pw,py+PLAT_H/2);cx.stroke();
  });
}

// ── Cat character draw (고등어 고양이)
function drawCat(ox,oy,facing,walkOsc,inAir){
  const f=facing;
  const isMoving=Math.abs(walkOsc)>0.3;
  const wf=isMoving?Math.floor(gt/7)%2:0;

  const bodyC='#7a7a7a';
  const stripeC='#282828';
  const bellyC='#c5c5c5';
  const earInC='#f4a0a0';
  const noseC='#ff8888';
  const eyeC='#7ec850';
  const pawC='#929292';

  // Leg swing amounts
  let flx=0,fly=0,blx=0,bly=0;
  if(inAir){fly=-5;bly=-3;}
  else if(isMoving){
    flx=f*(wf===0?5:-5);fly=wf===0?0:-4;
    blx=f*(wf===0?-5:5);bly=wf===0?-4:0;
  }

  // Tail (draw behind body)
  const tailSway=isMoving?Math.sin(gt*0.22)*18:Math.sin(gt*0.06)*6;
  const tbx=ox+(f>0?4:PW-4), tby=oy+PH*0.52;
  cx.lineCap='round';
  cx.strokeStyle=bodyC;cx.lineWidth=8;
  cx.beginPath();cx.moveTo(tbx,tby);
  cx.quadraticCurveTo(tbx-f*16,tby-6,tbx-f*30,tby-20+tailSway);cx.stroke();
  cx.strokeStyle=stripeC;cx.lineWidth=3;
  cx.beginPath();cx.moveTo(tbx,tby);
  cx.quadraticCurveTo(tbx-f*16,tby-6,tbx-f*30,tby-20+tailSway);cx.stroke();

  // Back leg + paw
  const blegx=f>0?ox+22:ox+4;
  fillRR(blegx+blx,oy+PH*0.58+bly,10,16,3,bodyC);
  fillRR(blegx+blx-1,oy+PH*0.83+bly,12,5,3,pawC);

  // Body
  cx.fillStyle=bodyC;
  cx.beginPath();cx.ellipse(ox+PW/2,oy+PH*0.5,PW*0.5,PH*0.27,0,0,Math.PI*2);cx.fill();

  // Belly
  cx.fillStyle=bellyC;
  cx.beginPath();cx.ellipse(ox+PW/2,oy+PH*0.55,PW*0.22,PH*0.18,0,0,Math.PI*2);cx.fill();

  // Body stripes
  cx.strokeStyle=stripeC;cx.lineWidth=2.5;cx.lineCap='round';
  [-7,0,7].forEach(dx=>{
    cx.beginPath();cx.moveTo(ox+PW/2+dx,oy+PH*0.27);cx.lineTo(ox+PW/2+dx*1.15,oy+PH*0.72);cx.stroke();
  });

  // Front leg + paw
  const flegx=f>0?ox+4:ox+22;
  fillRR(flegx+flx,oy+PH*0.58+fly,10,16,3,bodyC);
  fillRR(flegx+flx-1,oy+PH*0.83+fly,12,5,3,pawC);

  // Head
  const hx=ox+PW/2+(f>0?1:-1);
  const hy=oy+PH*0.19;
  fillC(hx,hy,15,bodyC);

  // Ears
  const drawEar=(ex,ey,d)=>{
    cx.fillStyle=bodyC;cx.beginPath();
    cx.moveTo(ex-6*d,ey-3);cx.lineTo(ex+6*d,ey-19);cx.lineTo(ex+8*d,ey-1);cx.fill();
    cx.fillStyle=earInC;cx.beginPath();
    cx.moveTo(ex-3*d,ey-4);cx.lineTo(ex+4*d,ey-14);cx.lineTo(ex+6*d,ey-2);cx.fill();
  };
  drawEar(hx-7,hy,-1);
  drawEar(hx+7,hy,1);

  // Forehead stripes
  cx.strokeStyle=stripeC;cx.lineWidth=1.8;
  [-4,0,4].forEach(dx=>{
    cx.beginPath();cx.moveTo(hx+dx,hy-14);cx.lineTo(hx+dx*1.2,hy-7);cx.stroke();
  });

  // Eyes
  const pupilW=inAir?1.2:2;
  fillC(hx-5,hy-2,3.5,eyeC);
  fillC(hx+5,hy-2,3.5,eyeC);
  fillC(hx-5+f*0.5,hy-2,pupilW,'#111');
  fillC(hx+5+f*0.5,hy-2,pupilW,'#111');
  fillC(hx-6,hy-3.5,1,'rgba(255,255,255,0.75)');
  fillC(hx+4,hy-3.5,1,'rgba(255,255,255,0.75)');

  // Nose
  cx.fillStyle=noseC;cx.beginPath();
  cx.moveTo(hx,hy+4);cx.lineTo(hx-3,hy+2);cx.lineTo(hx+3,hy+2);cx.fill();

  // Mouth
  cx.strokeStyle='#aa5555';cx.lineWidth=1.3;cx.lineCap='round';
  cx.beginPath();cx.moveTo(hx,hy+4);cx.lineTo(hx-3.5,hy+7.5);cx.stroke();
  cx.beginPath();cx.moveTo(hx,hy+4);cx.lineTo(hx+3.5,hy+7.5);cx.stroke();

  // Whiskers (3 per side)
  cx.strokeStyle='rgba(50,50,50,0.6)';cx.lineWidth=1;
  [[-10,hy+1,-1],[-9,hy+3.5,-1],[-11,hy+6,-1],[10,hy+1,1],[9,hy+3.5,1],[11,hy+6,1]].forEach(([dx,wy,d])=>{
    cx.beginPath();cx.moveTo(hx+d*2,wy);cx.lineTo(hx+dx+d*2,wy);cx.stroke();
  });
}

function drawPlayer(){
  const sx=player.x-cam.x;
  const sy=player.y;
  if(player.dead){
    cx.save();cx.translate(sx+PW/2,sy+PH/2);cx.rotate(player.deadRot);
    drawSprite(-PW/2,-PH/2,player.facing,0,true,true);
    cx.restore();return;
  }
  const walkOsc=player.onGround&&Math.abs(player.vx)>0.5?Math.sin(gt*0.28)*4:0;
  drawSprite(sx,sy,player.facing,walkOsc,!player.onGround,false);
}

// ── Enemies
function drawEnemies(){
  enemies.forEach(e=>{
    if(e.dead){
      if(e.deadTimer>0){
        const sx=e.x-cam.x,sy=e.y+e.h/2;
        fillRR(sx,sy-4,e.w,8,4,e.color);txt('✕',sx+e.w/2,sy,18,'#fff');
        cx.globalAlpha=e.deadTimer/35;
        txtS('+200',sx+e.w/2,sy-32,14,'#ffeb3b','#e65100');
        cx.globalAlpha=1;
      }
      return;
    }
    const sx=e.x-cam.x;if(sx+e.w<-20||sx>W+20)return;
    const bob=Math.sin(gt*0.14+e.x*0.03)*2;
    const sy=e.y+bob,facing=e.vx>0?1:-1;
    fillRR(sx,sy,e.w,e.h,8,e.color);
    cx.fillStyle='rgba(255,255,255,0.22)';cx.beginPath();cx.ellipse(sx+e.w*0.35,sy+e.h*0.25,e.w*0.22,e.h*0.15,0,0,Math.PI*2);cx.fill();
    const eyeX=facing>0?sx+e.w*0.65:sx+e.w*0.35;
    fillC(eyeX,sy+14,5,'#fff');fillC(eyeX+facing*2,sy+14,3,'#111');
    cx.strokeStyle='#111';cx.lineWidth=2.5;cx.lineCap='round';
    cx.beginPath();cx.moveTo(eyeX-5,sy+8);cx.lineTo(eyeX+5,sy+10);cx.stroke();
    fillRR(sx+5,sy+e.h-6,15,8,4,'rgba(0,0,0,0.3)');fillRR(sx+e.w-20,sy+e.h-6,15,8,4,'rgba(0,0,0,0.3)');
    cx.font=`bold 16px "맑은 고딕",sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
    cx.strokeStyle='rgba(0,0,0,0.55)';cx.lineWidth=3;cx.strokeText(e.word,sx+e.w/2,sy+e.h/2+2);
    cx.fillStyle='#fff';cx.fillText(e.word,sx+e.w/2,sy+e.h/2+2);
  });
}

  txt('← → 화살표: 이동    ↑ / 스페이스: 점프',W/2,304,14,'#fff');
  txt('적 위에서 점프하면 적 제거!   깃발에 닿으면 클리어!',W/2,325,13,'#b3e5fc');
  txt('모바일: 아래 버튼으로 조작',W/2,346,13,'rgba(255,200,255,0.9)');
  const blink=Math.floor(gt/22)%2===0;
  if(blink)txtS('스페이스 / 화면 탭으로 시작!',W/2,414,20,'#fff','#4a0072');
  cx.save();cx.translate(W/2-265,H-112);
  drawCat(0,0,1,Math.sin(gt*0.22)*5,false);
  cx.restore();
  drawMobileControls();
}

function drawStageClear(){
  drawBG();drawGround();drawPlatforms();drawCoins();drawFlag();drawEnemies();drawPlayer();drawHUD();
  cx.fillStyle='rgba(0,0,0,0.52)';cx.fillRect(0,0,W,H);
  const pulse=1+Math.sin(gt*0.15)*0.06;
  cx.save();cx.translate(W/2,H/2-45);cx.scale(pulse,pulse);
  txtS(`${th.name} 클리어!`,0,0,44,'#ffeb3b','#e65100');cx.restore();
  txtS('🌟 스테이지 보너스! 🌟',W/2,H/2+18,20,'#fff','#111');
  if(stageNum<10)txtS(`다음: ${THEMES[stageNum].name}`,W/2,H/2+55,19,'#b3e5fc','#111');
  else txtS('마지막 스테이지 완료!',W/2,H/2+55,20,'#b3e5fc','#111');
}

function drawGameOver(){
  cx.fillStyle='#111';cx.fillRect(0,0,W,H);
  for(let i=0;i<20;i++){
    const sx=(i*173)%W,sy=(i*113)%H;
    cx.fillStyle=`rgba(200,0,0,${0.04+Math.sin(gt*0.03+i)*0.03})`;cx.fillRect(sx,sy,80,60);
  }
  txtS('게임 오버',W/2,H/2-80,58,'#ef5350','#b71c1c');
  txt(`최종 점수: ${score}`,W/2,H/2-10,24,'#fff');
  if(hiScore>0)txt(`최고 점수: ${hiScore}`,W/2,H/2+28,18,'#ffd600');
  txt(`${th.name}에서 도전 중단!`,W/2,H/2+62,17,'#b3e5fc');
  const blink=Math.floor(gt/22)%2===0;
  if(blink)txtS('스페이스 / 탭으로 다시 시작',W/2,H/2+108,19,'#fff','#b71c1c');
  drawMobileControls();
}

function drawWin(){
  const grad=cx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,'#f57f17');grad.addColorStop(0.5,'#ffd600');grad.addColorStop(1,'#ff8f00');
  cx.fillStyle=grad;cx.fillRect(0,0,W,H);
  for(let i=0;i<55;i++){
    const x=(i*137+gt*2)%W,y=(i*97+gt*(0.5+i%3*0.3))%H;
    fillRR(x,y,8,8,2,['#e53935','#42a5f5','#66bb6a','#ab47bc','#fff'][i%5]);
  }
  const pulse=1+Math.sin(gt*0.1)*0.07;
  cx.save();cx.translate(W/2,H/2-70);cx.scale(pulse,pulse);txtS('게임 클리어!',0,0,52,'#fff','#e65100');cx.restore();
  txtS('10개 스테이지 완주!',W/2,H/2,28,'#1a237e','rgba(255,255,255,0.5)');
  txt(`최종 점수: ${score}`,W/2,H/2+45,22,'#1a237e');
  if(hiScore>0)txt(`최고 점수: ${hiScore}`,W/2,H/2+76,18,'#4a148c');
  txtS('고등어 고양이 최고!',W/2,H/2+115,26,'#fff','#e65100');
  const blink=Math.floor(gt/22)%2===0;
  if(blink)txtS('스페이스로 처음부터',W/2,H/2+155,18,'#fff','#e65100');
  drawMobileControls();
}

// ── Main loop
function loop(){
  requestAnimationFrame(loop);
  gt++;
  cx.clearRect(0,0,W,H);
  switch(state){
    case 'title':
      drawTitle();
      if(jp('Space')||jp('ArrowUp')||jpTouch()||jpTap()){
        stageNum=1;lives=3;score=0;initStage(1);state='playing';sfxTitle();
      }
      break;
    case 'playing':
      updatePlaying();
      drawBG();drawGround();drawPlatforms();drawCoins();drawFlag();drawEnemies();drawPlayer();drawHUD();
      drawMobileControls();
      break;
    case 'stageclear':
      drawStageClear();drawMobileControls();
      timer--;
      if(timer<=0){
        score+=stageNum*500;
        if(stageNum>=10){state='win';timer=0;}
        else{initStage(stageNum+1);state='playing';}
      }
      break;
    case 'gameover':
      drawGameOver();
      timer++;
      if(timer>90&&(jp('Space')||jp('ArrowUp')||jpTouch()||jpTap())){
        stageNum=1;lives=3;score=0;initStage(1);state='playing';sfxTitle();
      }
      break;
    case 'win':
      drawWin();
      if(jp('Space')||jp('ArrowUp')||jpTouch()||jpTap()){
        stageNum=1;lives=3;score=0;initStage(1);state='playing';sfxTitle();
      }
      break;
  }
}

loop();
</script>
</body>
</html>
